<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" role="img" aria-label="杏和堂中醫">
  <defs>
    <g id="stip">
      <circle r="1.1"/><circle r="1.1" cx="4" cy="2"/><circle r="1.1" cx="-4" cy="2"/>
      <circle r="1.1" cx="2" cy="5"/><circle r="1.1" cx="-2" cy="5"/><circle r="1.1" cx="0" cy="-4"/>
      <circle r="1.1" cx="5" cy="-1"/><circle r="1.1" cx="-5" cy="-1"/><circle r="1.1" cx="0" cy="8"/>
    </g>
  </defs>
  <!-- seal -->
  <rect x="1.5" y="1.5" width="53" height="53" rx="3" fill="none" stroke="#A6472E" stroke-width="2.5"/>
  <!-- stippled apricot -->
  <g fill="#A6472E" transform="translate(28,26)">
    <use href="#stip"/>
    <use href="#stip" transform="translate(0,3) scale(1.35)"/>
  </g>
  <!-- stem + leaf -->
  <path d="M28 16 C 28 10, 30 8, 34 6" fill="none" stroke="#5E6B4F" stroke-width="2"/>
  <path d="M34 6 C 40 4, 43 8, 38 12 C 34 14, 33 10, 34 6 Z" fill="#5E6B4F"/>
  <!-- wordmark -->
  <text x="66" y="27" font-family="'Noto Serif TC',serif" font-weight="900" font-size="24" fill="#26221C">杏和堂</text>
  <text x="66" y="45" font-family="'Noto Serif TC',serif" font-weight="400" font-size="11" letter-spacing="3" fill="#5E6B4F">中醫診所</text>
</svg>
