<style>
:root{--vat:#5F201C;--vat2:#4A1815;--cloth:#E9DEC6;--cloth2:#DECFB0;--dye:#8E2F2A;--ink:#241C17;--gold:#D9A441;--line:#3A1410}
*{box-sizing:border-box}
body{margin:0;background:var(--vat);color:var(--cloth);font-family:"Noto Sans TC",system-ui,sans-serif;line-height:1.6;padding-bottom:96px}
a{color:inherit}.mono{font-family:"Space Mono",monospace}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px}
header.top{border-bottom:2px solid var(--line);padding:16px 0 14px}
.brandrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brandrow img{width:46px;height:46px}
.brandname{font-family:"Shippori Mincho",serif;font-weight:800;font-size:22px;letter-spacing:.12em}
.brandname small{display:block;font-family:"Space Mono",monospace;font-weight:400;font-size:10px;letter-spacing:.3em;color:var(--gold);margin-top:2px}
h1.pg{font-family:"Shippori Mincho",serif;font-size:26px;letter-spacing:.06em;margin:24px 0 4px}
.lead{color:var(--cloth2);max-width:640px;font-size:14px;margin:0 0 18px}
.filters{display:flex;flex-wrap:wrap;gap:18px;background:var(--ink);border-radius:4px;padding:14px 16px;margin-bottom:8px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:6px}
.fg span{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1.5px solid var(--cloth2);background:transparent;color:var(--cloth);padding:5px 11px;border-radius:2px;font-size:12.5px;cursor:pointer;font-family:inherit}
.chip[aria-pressed="true"]{background:var(--cloth);color:var(--ink);border-color:var(--cloth)}
select{font-family:inherit;font-size:13px;padding:6px 8px;border:1.5px solid var(--cloth2);border-radius:2px;background:var(--ink);color:var(--cloth)}
.count{font-family:"Space Mono",monospace;font-size:12px;color:var(--cloth2);margin:6px 2px 16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:820px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--cloth);color:var(--ink);border:2px solid var(--ink);border-radius:3px;padding:10px;display:flex;flex-direction:column;gap:7px}
.card canvas{width:100%;aspect-ratio:1/1;border-radius:2px;display:block;background:#E9DEC6}
.card h3{font-family:"Shippori Mincho",serif;font-size:15px;margin:0}
.card .meta{font-family:"Space Mono",monospace;font-size:10.5px;color:#6a5c45;letter-spacing:.03em;line-height:1.5}
.card .no{font-family:"Space Mono",monospace;font-size:10px;color:var(--dye);letter-spacing:.14em}
footer{border-top:2px solid var(--line);margin-top:40px;padding:22px 0 8px;font-size:12px;color:var(--cloth2)}
.disc{margin-top:12px;font-size:11px;color:#a98a7a;font-family:"Space Mono",monospace;line-height:1.7}
nav.dock{position:fixed;left:0;right:0;bottom:0;background:var(--vat2);border-top:2px solid var(--line);z-index:40;box-shadow:0 -6px 20px rgba(0,0,0,.35)}
.dockin{max-width:1120px;margin:0 auto;display:flex;padding:8px 12px}
.clamp{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px 6px;text-decoration:none;position:relative}
.board{width:46px;height:26px;border-radius:2px;position:relative;background:linear-gradient(var(--cloth),var(--cloth2));border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;transition:height .18s}
.board::before{content:"";position:absolute;left:-4px;right:-4px;top:50%;height:9px;transform:translateY(-50%);background:#6b4a24;border:1.5px solid var(--ink);border-radius:2px;z-index:-1}
.wing{width:9px;height:9px;border-radius:50%;background:var(--gold);border:1.5px solid var(--ink);transition:transform .3s}
.clamp span{font-size:11.5px;color:var(--cloth2)}
.clamp small{font-family:"Space Mono",monospace;font-size:8.5px;color:#8a6a5a;letter-spacing:.1em}
.clamp[aria-current="page"] .board{height:19px;box-shadow:0 0 0 2px var(--dye)}
.clamp[aria-current="page"] .board::after{content:"";position:absolute;left:0;right:0;bottom:-3px;height:4px;background:var(--dye);border-radius:2px}
.clamp[aria-current="page"] .wing{transform:rotate(140deg)}
.clamp[aria-current="page"] span{color:var(--cloth)}
@media(max-width:560px){.clamp small{display:none}.board{width:38px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

<body>
<header class="top"><div class="wrap brandrow">
  <img src="assets/logo.svg" alt="絞白染坊 logo">
  <div class="brandname">絞白染坊<small>JIAOBAI · ATLAS</small></div>

<main class="wrap">
  <h1 class="pg">紋樣圖鑑 · 二十四幅</h1>
  <p class="lead">每一幅都不是描出來的——是同一支防染引擎依摺法給的對稱、型板給的基本域、染缸給的邊界即時解出來的。換一個摺法，同一組型板就成了另一幅。</p>

  <div class="filters">
    <div class="fg"><span>摺法</span><div class="chips" id="fFold">
      <button class="chip" data-v="all" aria-pressed="true">全部</button>
      <button class="chip" data-v="sekka" aria-pressed="false">三角雪花摺</button>
      <button class="chip" data-v="itajime" aria-pressed="false">板締格摺</button>
      <button class="chip" data-v="arashi" aria-pressed="false">嵐斜捲</button>
    </div></div>
    <div class="fg"><span>主色</span><div class="chips" id="fHue">
      <button class="chip" data-v="all" aria-pressed="true">全部</button>
      <button class="chip" data-v="red" aria-pressed="false">紅系</button>
      <button class="chip" data-v="blue" aria-pressed="false">藍系</button>
      <button class="chip" data-v="yellow" aria-pressed="false">黃系</button>
      <button class="chip" data-v="purple" aria-pressed="false">紫褐系</button>
    </div></div>
    <div class="fg"><span>排序</span>
      <select id="sortSel">
        <option value="no">編號</option>
        <option value="fold">依摺法</option>
        <option value="hue">依主色</option>
        <option value="name">依名稱</option>
      </select>
    </div>
  </div>
  <div class="count mono" id="count"></div>
  <div class="grid" id="grid"></div>
</main>

<footer><div class="wrap">
  絞白染坊 JIAOBAI · 台南後壁菁寮老街 17 號 · 06-662-0917

<script>
(function(){
"use strict";
var DYE={madder:[142,47,42],sappan:[176,72,63],indigo:[44,92,122],indigo2:[30,63,90],
  gardenia:[217,164,65],kariyasu:[154,162,60],gromwell:[110,74,114],kaki:[122,75,36],iron:[74,70,64]};
var HUE={madder:"red",sappan:"red",indigo:"blue",indigo2:"blue",gardenia:"yellow",kariyasu:"yellow",gromwell:"purple",kaki:"purple",iron:"purple"};
var CLOTH=[233,222,198];
var FOLDN={sekka:"三角雪花摺",itajime:"板締格摺",arashi:"嵐斜捲"};
var DYEN={madder:"茜草",sappan:"蘇枋",indigo:"藍靛",indigo2:"濃藍",gardenia:"梔子",kariyasu:"刈安",gromwell:"紫根",kaki:"柿澀",iron:"鐵媒"};
var MOTN={kumo:"蜘蛛絞",mame:"豆絞",shima:"縞",hishi:"菱格",asa:"麻葉",mujina:"無地"};

var PAT=[
 {n:"雪環",fold:"sekka",motif:"kumo",den:4,dye:"madder"},
 {n:"八楔霰",fold:"sekka",motif:"asa",den:5,dye:"indigo"},
 {n:"緋雪華",fold:"sekka",motif:"hishi",den:4,dye:"sappan"},
 {n:"梔子輪",fold:"sekka",motif:"kumo",den:6,dye:"gardenia"},
 {n:"紫根星",fold:"sekka",motif:"asa",den:4,dye:"gromwell"},
 {n:"鐵線菊",fold:"sekka",motif:"mame",den:5,dye:"iron"},
 {n:"藍霰",fold:"sekka",motif:"shima",den:6,dye:"indigo2"},
 {n:"刈安花",fold:"sekka",motif:"hishi",den:5,dye:"kariyasu"},
 {n:"格子茜",fold:"itajime",motif:"mame",den:4,dye:"madder"},
 {n:"藍板締",fold:"itajime",motif:"hishi",den:3,dye:"indigo"},
 {n:"縞疊",fold:"itajime",motif:"shima",den:5,dye:"sappan"},
 {n:"豆散",fold:"itajime",motif:"mame",den:6,dye:"gardenia"},
 {n:"麻葉格",fold:"itajime",motif:"asa",den:4,dye:"iron"},
 {n:"濃藍格",fold:"itajime",motif:"hishi",den:5,dye:"indigo2"},
 {n:"柿格子",fold:"itajime",motif:"mame",den:5,dye:"kaki"},
 {n:"刈安縞",fold:"itajime",motif:"shima",den:4,dye:"kariyasu"},
 {n:"嵐茜",fold:"arashi",motif:"shima",den:5,dye:"madder"},
 {n:"斜雨藍",fold:"arashi",motif:"mame",den:6,dye:"indigo"},
 {n:"嵐柿澀",fold:"arashi",motif:"shima",den:4,dye:"kaki"},
 {n:"斜麻葉",fold:"arashi",motif:"asa",den:5,dye:"gromwell"},
 {n:"梔子雨",fold:"arashi",motif:"hishi",den:5,dye:"gardenia"},
 {n:"鐵斜縞",fold:"arashi",motif:"shima",den:6,dye:"iron"},
 {n:"濃藍嵐",fold:"arashi",motif:"mame",den:5,dye:"indigo2"},
 {n:"刈安斜",fold:"arashi",motif:"asa",den:4,dye:"kariyasu"}
];
PAT.forEach(function(p,i){p.no=i+1;p.hue=HUE[p.dye];});

function frac(x){return x-Math.floor(x);}
function clamp(x,a,b){return x<a?a:(x>b?b:x);}
function smooth(x,a,b){var t=clamp((x-a)/(b-a),0,1);return t*t*(3-2*t);}
function hash2(x,y){var h=x*374761393+y*668265263;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967295;}
function openness(u,v,motif,dn){
  var cu=u-0.5,cv=v-0.5,r=Math.sqrt(cu*cu+cv*cv),ang=Math.atan2(cv,cu);
  if(motif==="mujina")return 1;
  if(motif==="kumo"){var rings=0.5+0.5*Math.cos(r*Math.PI*2*(dn*2.6));var sp=0.5+0.5*Math.cos(ang*(dn*2));return smooth(rings*0.62+sp*0.38,0.36,0.64);}
  if(motif==="mame"){var gx=frac(u*dn)-0.5,gy=frac(v*dn)-0.5;return smooth(Math.sqrt(gx*gx+gy*gy),0.17,0.31);}
  if(motif==="shima"){return smooth(0.5+0.5*Math.cos(u*Math.PI*2*(dn*1.8)),0.34,0.66);}
  if(motif==="hishi"){var lx=frac(u*dn)-0.5,ly=frac(v*dn)-0.5;return smooth(Math.abs(lx)+Math.abs(ly),0.20,0.34);}
  if(motif==="asa"){var s2=0.5+0.5*Math.cos(ang*(dn*2));var rr=0.5+0.5*Math.cos(r*Math.PI*2*(dn*2.2));return smooth(s2*0.55+rr*0.45,0.40,0.62);}
  return 1;
}
function foldMap(fx,fy,fold){
  if(fold==="itajime"){var R=4,uu=fx*R,vv=fy*R,cu=Math.floor(uu),cv=Math.floor(vv),u=uu-cu,v=vv-cv;if(cu%2!==0)u=1-u;if(cv%2!==0)v=1-v;return [u,v];}
  if(fold==="arashi"){var a=(fx+fy)*0.5,b=(fx-fy)*0.5+0.5,per=4,t=frac(a*per);if(Math.floor(a*per)%2!==0)t=1-t;return [t,clamp(b,0,1)];}
  var dx=fx-0.5,dy=fy-0.5,r=Math.sqrt(dx*dx+dy*dy)*2,ang=Math.atan2(dy,dx),w=Math.PI/8,m=ang%(2*w);if(m<0)m+=2*w;if(m>w)m=2*w-m;return [m/w,clamp(r,0,1)];
}
function draw(cv,p){
  var ctx=cv.getContext("2d");if(!ctx)return;
  var res=120,img=ctx.createImageData(res,res),d=img.data,dye=DYE[p.dye],i=0,dip=0.9;
  for(var y=0;y<res;y++){for(var x=0;x<res;x++){
    var fx=(x+0.5)/res,fy=(y+0.5)/res,mm=foldMap(fx,fy,p.fold),o=openness(mm[0],mm[1],p.motif,p.den);
    var n=(hash2((x*13)|0,(y*7)|0)-0.5)*0.07,amt=clamp(o*dip+n,0,1);
    d[i]=(CLOTH[0]+(dye[0]-CLOTH[0])*amt)|0;d[i+1]=(CLOTH[1]+(dye[1]-CLOTH[1])*amt)|0;d[i+2]=(CLOTH[2]+(dye[2]-CLOTH[2])*amt)|0;d[i+3]=255;i+=4;
  }}
  var t=document.createElement("canvas");t.width=res;t.height=res;t.getContext("2d").putImageData(img,0,0);
  ctx.imageSmoothingEnabled=true;ctx.drawImage(t,0,0,cv.width,cv.height);
}

var flt={fold:"all",hue:"all"},sort="no";
function chips(id,key){document.getElementById(id).addEventListener("click",function(e){
  var t=e.target;if(!t.getAttribute("data-v"))return;flt[key]=t.getAttribute("data-v");
  var k=this.querySelectorAll(".chip");for(var j=0;j<k.length;j++)k[j].setAttribute("aria-pressed","false");
  t.setAttribute("aria-pressed","true");update();
});}
chips("fFold","fold");chips("fHue","hue");
document.getElementById("sortSel").addEventListener("change",function(){sort=this.value;update();});

function update(){
  var list=PAT.filter(function(p){return (flt.fold==="all"||p.fold===flt.fold)&&(flt.hue==="all"||p.hue===flt.hue);});
  if(sort==="fold")list.sort(function(a,b){return a.fold<b.fold?-1:(a.fold>b.fold?1:a.no-b.no);});
  else if(sort==="hue")list.sort(function(a,b){return a.hue<b.hue?-1:(a.hue>b.hue?1:a.no-b.no);});
  else if(sort==="name")list.sort(function(a,b){return a.n<b.n?-1:1;});
  else list.sort(function(a,b){return a.no-b.no;});
  document.getElementById("count").textContent="共 "+list.length+" / 24 幅";
  var g=document.getElementById("grid");g.innerHTML="";
  list.forEach(function(p){
    var c=document.createElement("div");c.className="card";
    c.innerHTML="<div class='no'>No."+(p.no<10?"0":"")+p.no+"</div>"+
      "<canvas width='240' height='240'></canvas>"+
      "<h3>"+p.n+"</h3>"+
      "<div class='meta'>"+FOLDN[p.fold]+" · "+MOTN[p.motif]+"<br>"+DYEN[p.dye]+" · 絞縫 "+p.den+" 級</div>";
    g.appendChild(c);
    draw(c.querySelector("canvas"),p);
  });
}
update();
})();
</script>
</body>
</html>
