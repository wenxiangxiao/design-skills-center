<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="龍鳳理容院 Lungfeng Barber 商標">
  <!-- 外框琺瑯招牌 -->
  <rect x="8" y="8" width="304" height="304" fill="#0C7A6B"/>
  <rect x="8" y="8" width="304" height="304" fill="none" stroke="#FFC61A" stroke-width="10"/>
  <rect x="22" y="22" width="276" height="276" fill="none" stroke="#163FA0" stroke-width="6"/>

  <!-- 中央奶油牌面 -->
  <rect x="46" y="46" width="228" height="228" fill="#F2E7CB"/>
  <rect x="46" y="46" width="228" height="228" fill="none" stroke="#E30A17" stroke-width="8"/>

  <!-- 三色旋轉燈柱（左） -->
  <g>
    <rect x="66" y="70" width="34" height="180" fill="#fff"/>
    <rect x="66" y="70" width="34" height="180" fill="none" stroke="#163FA0" stroke-width="5"/>
    <polygon points="66,86 100,70 100,90 66,106" fill="#E30A17"/>
    <polygon points="66,116 100,100 100,120 66,136" fill="#163FA0"/>
    <polygon points="66,146 100,130 100,150 66,166" fill="#E30A17"/>
    <polygon points="66,176 100,160 100,180 66,196" fill="#163FA0"/>
    <polygon points="66,206 100,190 100,210 66,226" fill="#E30A17"/>
    <rect x="62" y="60" width="42" height="14" fill="#FFC61A" stroke="#163FA0" stroke-width="4"/>
    <rect x="62" y="246" width="42" height="14" fill="#FFC61A" stroke="#163FA0" stroke-width="4"/>
  </g>

  <!-- 龍字塊 -->
  <rect x="120" y="70" width="66" height="66" fill="#E30A17"/>
  <text x="153" y="122" font-family="'Noto Serif TC',serif" font-size="52" font-weight="900" fill="#FFC61A" text-anchor="middle">龍</text>
  <!-- 鳳字塊 -->
  <rect x="196" y="70" width="66" height="66" fill="#163FA0"/>
  <text x="229" y="122" font-family="'Noto Serif TC',serif" font-size="52" font-weight="900" fill="#F2E7CB" text-anchor="middle">鳳</text>

  <!-- 剪刀 solid shape -->
  <g fill="#163FA0">
    <circle cx="140" cy="210" r="16"/>
    <circle cx="140" cy="210" r="7" fill="#F2E7CB"/>
    <circle cx="182" cy="210" r="16"/>
    <circle cx="182" cy="210" r="7" fill="#F2E7CB"/>
    <polygon points="150,204 245,160 250,170 158,214" />
    <polygon points="172,204 245,232 250,222 164,192" fill="#E30A17"/>
  </g>

  <!-- 底部字條 -->
  <rect x="120" y="238" width="142" height="26" fill="#0C7A6B"/>
  <text x="191" y="257" font-family="'Bungee','Noto Sans TC',sans-serif" font-size="15" font-weight="700" fill="#FFC61A" text-anchor="middle" letter-spacing="1">LUNGFENG</text>
</svg>
