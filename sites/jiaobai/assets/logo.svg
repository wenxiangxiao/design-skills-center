<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="絞白染坊">
  <rect width="120" height="120" rx="10" fill="#5F201C"/>
  <g transform="translate(60 60)">
    <circle r="46" fill="#E9DEC6"/>
    <!-- 8-fold snowflake resist motif: madder dye with ecru resisted shapes -->
    <g>
      <g id="wedge">
        <path d="M0 0 L0 -46 A46 46 0 0 1 32.5 -32.5 Z" fill="#8E2F2A"/>
        <circle cx="0" cy="-30" r="6.5" fill="#E9DEC6"/>
        <path d="M0 -44 L6 -30 L0 -18 L-6 -30 Z" fill="#E9DEC6" opacity="0.55"/>
        <circle cx="13" cy="-24" r="3.2" fill="#E9DEC6"/>
      </g>
      <use href="#wedge" transform="rotate(45)"/>
      <use href="#wedge" transform="rotate(90)"/>
      <use href="#wedge" transform="rotate(135)"/>
      <use href="#wedge" transform="rotate(180)"/>
      <use href="#wedge" transform="rotate(225)"/>
      <use href="#wedge" transform="rotate(270)"/>
      <use href="#wedge" transform="rotate(315)"/>
    </g>
    <circle r="8" fill="#241C17"/>
    <circle r="4" fill="#D9A441"/>
    <circle r="46" fill="none" stroke="#241C17" stroke-width="2"/>
  </g>
</svg>
