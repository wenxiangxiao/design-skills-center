<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" role="img" aria-label="驟雨日報報頭：雨中燈塔報徽與刊名">
  <title>驟雨日報 The Sudden Rain Daily</title>
  <desc>木刻版畫風報徽：雙圈之內，燈塔立於基隆港的浪與斜雨之間，右下鈐印章紅方印。徽右為直排刊名與英文副題。</desc>
  <rect width="640" height="240" fill="#f4eede"/>
  <rect x="8" y="8" width="624" height="224" fill="none" stroke="#221d15" stroke-width="3"/>
  <rect x="16" y="16" width="608" height="208" fill="none" stroke="#221d15" stroke-width="1"/>

  <!-- 報徽：雨中燈塔 -->
  <g transform="translate(120,120)">
    <circle r="88" fill="none" stroke="#221d15" stroke-width="5"/>
    <circle r="78" fill="none" stroke="#221d15" stroke-width="1.6"/>
    <!-- 斜雨 -->
    <g stroke="#221d15" stroke-width="3.4" stroke-linecap="round">
      <line x1="-44" y1="-58" x2="-54" y2="-34"/>
      <line x1="-20" y1="-66" x2="-30" y2="-42"/>
      <line x1="6" y1="-70" x2="-4" y2="-46"/>
      <line x1="32" y1="-64" x2="22" y2="-40"/>
      <line x1="54" y1="-52" x2="44" y2="-30"/>
    </g>
    <!-- 燈塔 -->
    <path d="M-15 36 L-9 -26 L11 -26 L17 36 Z" fill="#221d15"/>
    <rect x="-12" y="-40" width="26" height="14" fill="#221d15"/>
    <path d="M-17 -40 L19 -40 L1 -56 Z" fill="#221d15"/>
    <rect x="-5" y="-8" width="12" height="14" fill="#f4eede"/>
    <!-- 浪 -->
    <path d="M-70 48 Q-54 36 -38 48 T-6 48 T26 48 T58 48 T78 48" fill="none" stroke="#221d15" stroke-width="4.6"/>
    <path d="M-62 64 Q-46 52 -30 64 T2 64 T34 64 T64 64" fill="none" stroke="#221d15" stroke-width="2.8"/>
    <!-- 印章 -->
    <g transform="translate(38,14) rotate(-3)">
      <rect x="0" y="0" width="30" height="30" fill="#a63b2c"/>
      <rect x="3.5" y="3.5" width="23" height="23" fill="none" stroke="#f4eede" stroke-width="1.4"/>
      <text x="15" y="21.5" font-size="15" text-anchor="middle" fill="#f4eede" font-family="'Noto Serif TC',serif" font-weight="700">雨</text>
    </g>
  </g>

  <!-- 刊名 -->
  <text x="272" y="128" font-size="86" fill="#221d15" font-family="'Noto Serif TC','PMingLiU',serif" font-weight="900" letter-spacing="14">驟雨日報</text>
  <line x1="272" y1="152" x2="612" y2="152" stroke="#221d15" stroke-width="1.6"/>
  <line x1="272" y1="157" x2="612" y2="157" stroke="#221d15" stroke-width="3.4"/>
  <text x="272" y="188" font-size="19" fill="#544c3d" font-family="'Playfair Display',Georgia,serif" font-style="italic" letter-spacing="6">THE SUDDEN RAIN DAILY</text>
  <text x="272" y="214" font-size="14" fill="#544c3d" font-family="'Noto Serif TC',serif" letter-spacing="8">基隆・驟雨書店 發行｜逢雨照常出刊</text>
</svg>
