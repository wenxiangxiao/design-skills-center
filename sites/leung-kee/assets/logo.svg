<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 120" role="img" aria-label="亮記 通宵冰室大牌檔">
  <defs>
    <filter id="lkglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lkglow2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- signboard frame -->
  <rect x="6" y="6" width="248" height="108" rx="4" fill="#0c1420" stroke="#22e0d6" stroke-width="2" filter="url(#lkglow)"/>
  <!-- bowl + chopsticks neon motif -->
  <g filter="url(#lkglow2)" fill="none" stroke-linecap="round">
    <path d="M28 74 q26 26 52 0" stroke="#ff2d55" stroke-width="4"/>
    <path d="M24 72 h60" stroke="#ff2d55" stroke-width="4"/>
    <path d="M40 40 l26 22 M58 34 l16 26" stroke="#ffd23f" stroke-width="3"/>
    <path d="M54 30 q4 8 -2 16 M64 30 q6 6 2 16" stroke="#ff7a1a" stroke-width="2.4"/>
  </g>
  <!-- 亮記 -->
  <text x="108" y="70" font-family="'Noto Serif TC',serif" font-weight="900" font-size="58" fill="#ffd23f" filter="url(#lkglow2)">亮記</text>
  <text x="110" y="98" font-family="'Oswald',sans-serif" font-size="15" letter-spacing="3" fill="#22e0d6" filter="url(#lkglow)">LEUNG KEE · 通宵</text>
</svg>
