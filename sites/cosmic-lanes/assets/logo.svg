<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 104" width="340" height="104" role="img" aria-label="COSMIC LANES 宇宙球道">
  <defs>
    <style>
      .wm{font-family:"Baloo 2",system-ui,sans-serif;font-weight:800}
      .sub{font-family:"Kode Mono",monospace;font-weight:700}
    </style>
  </defs>
  <!-- orbit + star emblem -->
  <g transform="translate(52 52)">
    <ellipse cx="0" cy="0" rx="46" ry="18" fill="none" stroke="#1E1330" stroke-width="4" transform="rotate(-22)"/>
    <!-- bowling ball -->
    <circle cx="0" cy="6" r="26" fill="#1E1330"/>
    <circle cx="-8" cy="-2" r="3.1" fill="#12B5AC"/>
    <circle cx="1" cy="-4" r="3.1" fill="#12B5AC"/>
    <circle cx="-4" cy="6" r="3.1" fill="#12B5AC"/>
    <!-- comet star -->
    <path d="M40 -30 l4.6 10 10.6 1.1 -7.9 7.2 2.2 10.5 -9.5 -5.4 -9.5 5.4 2.2 -10.5 -7.9 -7.2 10.6 -1.1z"
          fill="#FFD400" stroke="#1E1330" stroke-width="2.4" transform="translate(-2 -2) scale(.9)"/>
  </g>
  <!-- wordmark -->
  <text class="wm" x="96" y="46" font-size="34" fill="#FF5A1F" stroke="#1E1330" stroke-width="1.4">COSMIC</text>
  <text class="wm" x="96" y="80" font-size="34" fill="#FDF4DA" stroke="#1E1330" stroke-width="1.4">LANES</text>
  <text class="sub" x="98" y="98" font-size="10.5" letter-spacing="4" fill="#1E1330">宇宙球道 · EST 1983 · MI</text>
</svg>
