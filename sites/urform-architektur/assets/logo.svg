<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" role="img" aria-label="URFORM 原型建築 標誌">
  <rect width="360" height="120" fill="#F4F1E9"/>
  <!-- 幾何標記：圓（紅）＋方（藍）＋三角（黃），黑實線描邊、無圓角 -->
  <g stroke="#1A1A1A" stroke-width="3.5" stroke-linejoin="round">
    <circle cx="34" cy="40" r="26" fill="#E63329"/>
    <rect x="60" y="14" width="46" height="46" fill="#1E4FA3"/>
    <polygon points="18,106 62,42 106,106" fill="#F5C518"/>
  </g>
  <!-- 字標 -->
  <text x="134" y="58" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="42" letter-spacing="4" fill="#1A1A1A">URFORM</text>
  <text x="136" y="90" font-family="'Noto Sans TC', sans-serif" font-weight="500" font-size="17" letter-spacing="12" fill="#1A1A1A">原型建築</text>
  <line x1="134" y1="70" x2="330" y2="70" stroke="#1A1A1A" stroke-width="2"/>
</svg>
