<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="恆準鐘錶維修所 標誌">
  <defs>
    <style>
      .p{fill:none;stroke:#C79A4B;stroke-width:2}
      .t{fill:none;stroke:#C79A4B;stroke-width:1;stroke-dasharray:1.6 3.6}
      .o{fill:#8C3A2B}
    </style>
  </defs>
  <circle cx="60" cy="60" r="54" class="p"/>
  <circle cx="60" cy="60" r="47" class="t"/>
  <!-- balance wheel spokes -->
  <circle cx="60" cy="60" r="30" class="p"/>
  <g stroke="#C79A4B" stroke-width="2">
    <line x1="60" y1="30" x2="60" y2="90"/>
    <line x1="30" y1="60" x2="90" y2="60"/>
    <line x1="38.8" y1="38.8" x2="81.2" y2="81.2"/>
    <line x1="81.2" y1="38.8" x2="38.8" y2="81.2"/>
  </g>
  <circle cx="60" cy="60" r="9" fill="#1B1815" stroke="#C79A4B" stroke-width="2"/>
  <circle cx="60" cy="60" r="2.6" class="o"/>
  <!-- twelve/six index -->
  <rect x="58.5" y="8" width="3" height="9" class="o"/>
  <rect x="58.5" y="103" width="3" height="9" fill="#C79A4B"/>
</svg>
