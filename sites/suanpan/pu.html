<style>
:root{--board:#23372E;--board2:#2C4638;--board3:#1B2A23;--chalk:#EDE5D0;--dim:rgba(237,229,208,.62);
 --faint:rgba(237,229,208,.30);--wood:#7A4E28;--amber:#CE9A4E;--amber2:#E0B36A;--red:#C6402F;--slate:#6E8A93;--line:rgba(237,229,208,.16);
 --serif:"Noto Serif TC",serif;--sans:"Noto Sans TC",sans-serif;--slab:"Zilla Slab",serif;--mono:"Kode Mono",monospace;}
*{box-sizing:border-box}
body{margin:0;background:var(--board);color:var(--chalk);font-family:var(--sans);line-height:1.75;padding-bottom:84px;
 background-image:repeating-linear-gradient(90deg,transparent 0 3px,rgba(0,0,0,.035) 3px 4px);}
a{color:inherit}
.wrap{max-width:1060px;margin:0 auto;padding:0 22px}
header.mast{border-bottom:2px solid var(--line);background:linear-gradient(var(--board3),var(--board))}
.mast .wrap{display:flex;align-items:center;gap:16px;padding:16px 22px}
.logo{width:48px;height:48px;flex:0 0 auto}
.mast h1{font-family:var(--serif);font-weight:900;font-size:20px;margin:0;letter-spacing:.04em}
.mast .en{font-family:var(--mono);font-size:10.5px;letter-spacing:.3em;color:var(--amber);text-transform:uppercase}
.mast .meta{margin-left:auto;text-align:right;font-size:11.5px;color:var(--dim);font-family:var(--mono)}
.head{padding:34px 0 14px}
.head .k{font-family:var(--mono);font-size:12px;letter-spacing:.26em;color:var(--amber);text-transform:uppercase}
.head h2{font-family:var(--serif);font-weight:900;font-size:clamp(24px,4vw,34px);margin:6px 0 8px}
.head p{color:var(--dim);max-width:60ch;margin:0}
.controls{position:sticky;top:0;z-index:20;background:linear-gradient(var(--board),var(--board) 78%,rgba(35,55,46,0));
 padding:14px 0 16px;margin-bottom:8px}
.crow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px}
.crow .lbl{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.2em;width:44px;text-transform:uppercase}
.chip{font-family:var(--mono);font-size:12px;border:1.5px solid var(--faint);background:transparent;color:var(--dim);
 padding:5px 11px;border-radius:2px;cursor:pointer}
.chip[aria-pressed="true"]{border-color:var(--amber);color:var(--chalk);background:rgba(206,154,78,.14)}

 font-family:var(--sans);font-size:14px;padding:7px 11px;border-radius:2px}

.item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.item h3{font-family:var(--serif);font-weight:700;font-size:18px;margin:0}

.b.cat{color:var(--amber);border-color:rgba(206,154,78,.4)}

footer{border-top:2px solid var(--line);margin-top:36px;background:var(--board3)}
footer .wrap{padding:26px 22px 40px}

nav.dock{position:fixed;left:0;right:0;bottom:0;z-index:40;background:linear-gradient(rgba(27,42,35,.6),var(--board3));border-top:2px solid var(--wood);backdrop-filter:blur(4px)}

 background:var(--amber);border:1px solid #5f3c1e;transition:transform .18s cubic-bezier(.34,1.4,.5,1),background .18s;transform:translateY(14px)}
nav.dock a[aria-current="page"] .bead{transform:translateY(-6px);background:var(--red);border-color:#7a2016}

<script>
"use strict";
function miniAbacus(n,minCols){n=Math.max(0,Math.floor(n));var s=String(n);
 var cols=Math.max(minCols||1,s.length);s=s.padStart(cols,'0');
 var cw=13,x0=8,top=3,beam=17,bh=6.5,h=52,w=x0+(cols-1)*cw+8;
 var out="<svg class='miniab' width='"+(w*0.6)+"' height='"+(h*0.6)+"' viewBox='0 0 "+w+" "+h+"' role='img' aria-label='算盤數字 "+n+"'>";
 for(var i=0;i<cols;i++){var cx=x0+i*cw;out+="<line x1='"+cx+"' y1='"+top+"' x2='"+cx+"' y2='"+(h-2)+"' stroke='#7A4E28' stroke-width='1.4'/>";}
 out+="<line x1='"+(x0-5)+"' y1='"+beam+"' x2='"+(x0+(cols-1)*cw+5)+"' y2='"+beam+"' stroke='#EDE5D0' stroke-width='1.4'/>";
 for(var i=0;i<cols;i++){var cx=x0+i*cw,d=+s[i],hv=d>=5?1:0,ea=d>=5?d-5:d;
  var hy=hv?(beam-3-bh/2):(top+1+bh/2);out+=dia(cx,hy,hv);
  for(var j=0;j<4;j++){var ey=(j<ea)?(beam+3+bh/2+j*bh):(h-3-bh/2-(3-j)*bh);out+=dia(cx,ey,j<ea);}}
 return out+"</svg>";
 function dia(cx,cy,on){var ww=cw*0.42,hh=bh/2*0.95,c=on?"#C6402F":"#CE9A4E";
  return "<polygon points='"+(cx-ww)+","+cy+" "+cx+","+(cy-hh)+" "+(cx+ww)+","+cy+" "+cx+","+(cy+hh)+"' fill='"+c+"' stroke='#5f3c1e' stroke-width='.6'/>";}}

var DATA=[
 {t:"一四珠",en:"1-4 bead",cat:"器",lvl:"入門",kw:"現行盤 樑 上珠 下珠",num:9,d:"現行珠算盤：每檔上一珠作五、下四珠各作一，一檔可表 0–9。台灣自民國五十年代起改用一四珠。"},
 {t:"樑",en:"beam",cat:"器",lvl:"入門",kw:"橫樑 定位",num:5,d:"分隔上下珠的橫木。撥珠靠樑即為「入位」，離樑即歸零。讀數只看貼樑的珠。"},
 {t:"檔（位）",en:"rod",cat:"器",lvl:"入門",kw:"個十百千 定位點",num:10,d:"一根直桿為一檔，代表一個數位。定位點所在多定為個位，向左為十、百、千。"},
 {t:"置數・讀數",en:"set & read",cat:"術語",lvl:"入門",kw:"撥數 一眼",num:365,d:"把一個數撥上盤稱置數，把盤面看成數稱讀數。讀數要練到一眼成形，不逐珠數。"},
 {t:"湊五",en:"make-five",cat:"加算",lvl:"入門",kw:"補五 加法 4321",num:6,d:"下珠不足以直接加時，改「撥去補數、進上珠一顆」。如 4＋3：無三珠可加，撥去二珠、進上珠，得七。補數對：1↔4、2↔3。"},
 {t:"破五",en:"break-five",cat:"減算",lvl:"入門",kw:"減法 退五",num:1,d:"減法版的湊五：不足以直接退下珠時，退上珠一顆、補回下珠補數。如 7－3：退上珠、補下珠二，得四。"},
 {t:"五升十進",en:"carry to ten",cat:"加算",lvl:"入門",kw:"進位 滿十",num:10,d:"一檔滿十須向左進一。珠算以「去九加補、進上位」完成，不必先寫再進。"},
 {t:"去九加補",en:"nine-complement carry",cat:"加算",lvl:"進階",kw:"進十 補數 加法",num:23,d:"本檔加數過大無法直接加時，向左檔進一、於本檔減去該數對十的補數。如 8＋5：左進一、本檔減五的補數五⋯實作為減 5 再借，得十三。"},
 {t:"退位減",en:"borrow-subtract",cat:"減算",lvl:"進階",kw:"借位 減法",num:9,d:"本檔不夠減時向左檔退一、本檔加回補數。與去九加補互為逆運算。"},
 {t:"補數表",en:"complement table",cat:"術語",lvl:"入門",kw:"湊五 進十 對子",num:5,d:"湊五補數：1-4、2-3；進十補數：1-9、2-8、3-7、4-6、5-5。刻進手指，加減才快。"},
 {t:"見取算",en:"mitori (sight addition)",cat:"加算",lvl:"檢定",kw:"加減 一排 檢定",num:2586,d:"眼睛依序掃過一排數、手同步在盤上加減，最後讀總和。是級位檢定的主科，也是商計基本功。"},
 {t:"傳票算",en:"voucher addition",cat:"商計",lvl:"檢定",kw:"翻票 憑證 帳",num:4830,d:"翻閱一疊傳票（憑證），逐張把金額加上盤。左手翻票、右手撥珠，講究節奏與不回頭。"},
 {t:"乘算・留頭乘",en:"multiplication",cat:"乘除",lvl:"檢定",kw:"九九 積 相乘",num:72,d:"被乘數留在盤上，以乘數自高位逐位相乘、積落對應檔並隨即進位。另有破頭乘等布局法。"},
 {t:"除算・歸除",en:"division",cat:"乘除",lvl:"檢定",kw:"商 除 歸法",num:8,d:"以「九歸」口訣（如二一添作五）逐位求商、減積、落下位。歸除為傳統法，商除較近算式。"},
 {t:"九九",en:"multiplication rhymes",cat:"乘除",lvl:"入門",kw:"口訣 乘 表",num:81,d:"一一如一到九九八十一的乘法口訣。乘除算的底層記憶，須背到不假思索。"},
 {t:"九歸口訣",en:"division rhymes",cat:"乘除",lvl:"進階",kw:"歸除 添作 口訣",num:5,d:"除法口訣，如「二一添作五、逢二進一十」。配合歸除逐位定商。"},
 {t:"珠心算",en:"anzan (mental)",cat:"術語",lvl:"進階",kw:"心算 想像盤 閉眼",num:1000,d:"熟盤之後在腦中想像一具算盤撥動，脫離實盤直接得數。是珠算訓練的果實，非另一套方法。"},
 {t:"級位",en:"kyu grade",cat:"段級",lvl:"檢定",kw:"10級 1級 檢定 初學",num:10,d:"檢定的初階，數字愈大愈初階，10 級起至 1 級。位數與口數隨級遞增，是循級而上的階梯。"},
 {t:"段位",en:"dan grade",cat:"段級",lvl:"檢定",kw:"初段 十段 高階",num:6,d:"級位之上為段位，初段至十段。位數多、口數多、限時嚴，兼考乘除與傳票。"},
 {t:"綜合檢定",en:"combined exam",cat:"段級",lvl:"檢定",kw:"見取 乘 除 傳票 及格",num:7,d:"一場含見取算、乘算、除算（段位另加傳票）數科，各科達基準線始判合格。本堂週日辦模擬。"},
 {t:"空盤・歸零",en:"clear",cat:"術語",lvl:"入門",kw:"清盤 重置 零",num:0,d:"開算前把所有珠撥離橫樑，盤面為零。習慣以食指與拇指一抹清盤。"},
 {t:"定位",en:"place assignment",cat:"術語",lvl:"進階",kw:"小數 元角分 定位點",num:100,d:"依題意指定某檔為個位（或元位），才能正確讀出含小數、含單位的結果。乘除尤重定位。"},
 {t:"運指",en:"finger technique",cat:"術語",lvl:"入門",kw:"拇指 食指 撥珠",num:4,d:"下珠上撥用拇指、下撥用食指；上珠一律食指。指法固定，速度才穩、不亂。"},
 {t:"段級收件基準",en:"passing line",cat:"段級",lvl:"檢定",kw:"及格 正解率 七題",num:7,d:"本堂教學模擬以十題七解為各級收件基準，九解且用時在標準內判優等。正式檢定依主辦單位規章。"}
];

var cats=["全部","器","術語","加算","減算","乘除","商計","段級"];
var lvls=["全部","入門","進階","檢定"];
var fCat="全部",fLvl="全部",fQ="";
function chips(rowId,arr,getf,setf){var row=document.getElementById(rowId);
 arr.forEach(function(v){var b=document.createElement('button');b.className="chip";b.type="button";b.textContent=v;
  b.setAttribute('aria-pressed',getf()===v?"true":"false");
  b.addEventListener('click',function(){setf(v);
   Array.prototype.forEach.call(row.querySelectorAll('.chip'),function(c){c.setAttribute('aria-pressed',"false");});
   b.setAttribute('aria-pressed',"true");draw();});
  row.appendChild(b);});}
chips('catRow',cats,function(){return fCat;},function(v){fCat=v;});
chips('lvlRow',lvls,function(){return fLvl;},function(v){fLvl=v;});
document.getElementById('q').addEventListener('input',function(e){fQ=e.target.value.trim();draw();});

var grid=document.getElementById('grid'),empty=document.getElementById('empty'),countEl=document.getElementById('count');
function draw(){
 var out="",shown=0;
 DATA.forEach(function(x){
  if(fCat!=="全部"&&x.cat!==fCat)return;
  if(fLvl!=="全部"&&x.lvl!==fLvl)return;
  if(fQ){var hay=(x.t+" "+x.en+" "+x.kw+" "+x.d).toLowerCase();if(hay.indexOf(fQ.toLowerCase())<0)return;}
  shown++;
  out+="<div class='item'><div class='top'><div><h3>"+x.t+"</h3><div class='en'>"+x.en+"</div></div>"
   +"<div class='ab'>"+miniAbacus(x.num,2)+"</div></div>"
   +"<p>"+x.d+"</p><div class='badges'><span class='b cat'>"+x.cat+"</span><span class='b lvl'>"+x.lvl+"</span></div></div>";
 });
 grid.innerHTML=out;grid.style.display=shown?"grid":"none";empty.style.display=shown?"none":"block";
 countEl.textContent="共 "+shown+" ／ "+DATA.length+" 則";
}
draw();
</script>
