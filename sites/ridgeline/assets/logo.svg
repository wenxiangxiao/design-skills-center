  <text x="46" y="19" font-family="'Archivo','Arial Narrow',sans-serif" font-size="16" font-weight="800" letter-spacing="1.5" fill="#243138">RIDGELINE</text>
  <text x="46" y="33" font-family="'Noto Sans TC',sans-serif" font-size="11" font-weight="700" letter-spacing="5" fill="#1E7A82">稜線山屋</text>
