<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120" role="img" aria-label="野火當代版畫館 WILDFIRE PRESS">
  <rect width="360" height="120" fill="#E7E2D6"/>
  <!-- woodcut wildfire mark: key-block black + spot red flame -->
  <g>
    <!-- carved frame -->
    <rect x="8" y="8" width="104" height="104" fill="none" stroke="#171410" stroke-width="4"/>
    <!-- flame key block (black) -->
    <path d="M60 22 C50 40 68 48 54 64 C46 74 52 92 66 96 C58 82 72 78 66 66 C78 74 80 56 70 50 C76 42 70 30 60 22 Z" fill="#171410"/>
    <!-- spot red inner flame, slightly out of register -->
    <path d="M62 34 C56 46 66 52 58 62 C53 69 58 82 68 84 C63 74 72 70 67 62 C74 66 74 54 68 51 C71 45 68 39 62 34 Z" fill="#C23A24"/>
    <!-- carving chatter marks -->
    <path d="M20 100 L40 100 M20 92 L34 92 M84 100 L100 100" stroke="#171410" stroke-width="3" stroke-linecap="square"/>
    <!-- registration cross -->
    <path d="M100 20 L100 32 M94 26 L106 26" stroke="#23405B" stroke-width="2.5"/>
  </g>
  <!-- wordmark -->
  <g fill="#171410">
    <text x="132" y="58" font-family="'Noto Serif TC',serif" font-weight="900" font-size="46" letter-spacing="2">野火</text>
    <rect x="132" y="70" width="132" height="4" fill="#C23A24"/>
    <text x="132" y="98" font-family="'Space Mono',monospace" font-weight="700" font-size="15" letter-spacing="3">WILDFIRE PRESS</text>
    <text x="132" y="26" font-family="'Space Mono',monospace" font-weight="400" font-size="11" letter-spacing="2" fill="#23405B">當代版畫館 / EST.2016</text>
  </g>
</svg>
