  <g transform="translate(6,6)">
    <circle cx="24" cy="30" r="17" fill="#E8734A"/>
    <circle cx="24" cy="30" r="17" fill="none" stroke="#3A2B22" stroke-width="2" stroke-dasharray="2 3"/>
    <!-- pads -->
    <ellipse cx="24" cy="34" rx="7" ry="6" fill="#FBF3E4"/>
    <circle cx="15" cy="24" r="3.4" fill="#FBF3E4"/>
    <circle cx="24" cy="21" r="3.4" fill="#FBF3E4"/>
    <circle cx="33" cy="24" r="3.4" fill="#6FA663"/>
    <circle cx="24" cy="21" r="3.4" fill="none" stroke="#3A2B22" stroke-width="1"/>
  </g>
  <text x="60" y="30" font-family="'Baloo 2','Comic Sans MS',cursive" font-weight="800" font-size="23" fill="#3A2B22">紙爪</text>
  <text x="110" y="26" font-family="'Baloo 2',sans-serif" font-weight="700" font-size="15" fill="#E8734A">Paper Paws</text>
  <text x="110" y="44" font-family="'Space Mono',monospace" font-size="9" letter-spacing="2" fill="#6FA663">PET GROOMING · TAIPEI</text>
