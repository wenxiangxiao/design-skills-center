<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 44" role="img" aria-label="三聯式搬家 Triplicate Moving Co.">
  <!-- three stacked copies (white / blue / blue) -->
  <rect x="18" y="12" width="22" height="28" fill="#3A5A86" opacity=".45" transform="translate(6,6)"/>
  <rect x="14" y="9" width="22" height="28" fill="#3A5A86" opacity=".7" transform="translate(3,3)"/>
  <rect x="10" y="6" width="22" height="28" fill="#F3ECDA" stroke="#1E2A38" stroke-width="2"/>
  <line x1="14" y1="13" x2="28" y2="13" stroke="#1E2A38" stroke-width="1.4"/>
  <line x1="14" y1="18" x2="28" y2="18" stroke="#8A98A6" stroke-width="1.2"/>
  <line x1="14" y1="23" x2="24" y2="23" stroke="#8A98A6" stroke-width="1.2"/>
  <!-- red stamp ring -->
  <circle cx="22" cy="26" r="8" fill="none" stroke="#B32B22" stroke-width="2" opacity=".85" transform="rotate(-12 22 26)"/>
  <text x="22" y="29" font-family="'Noto Serif TC',serif" font-size="7" fill="#B32B22" text-anchor="middle" transform="rotate(-12 22 26)">核准</text>
  <text x="52" y="22" font-family="'Noto Serif TC',serif" font-weight="900" font-size="15" fill="#1E2A38">三聯式搬家</text>
  <text x="52" y="37" font-family="'Noto Sans Mono',monospace" font-size="9" fill="#46586B" letter-spacing="1">TRIPLICATE MOVING CO.</text>
</svg>
