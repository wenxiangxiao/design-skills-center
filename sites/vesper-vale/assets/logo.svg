<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="暮藤酒莊 Vesper Vale 徽記">
  <rect width="120" height="120" fill="#15100B"/>
  <!-- double oval seal -->
  <ellipse cx="60" cy="60" rx="46" ry="52" fill="none" stroke="#B98A3E" stroke-width="2"/>
  <ellipse cx="60" cy="60" rx="40" ry="46" fill="none" stroke="#B98A3E" stroke-width="1"/>
  <!-- crescent moon (vesper / dusk) -->
  <path d="M78 26 a20 20 0 1 0 6 20 a15 15 0 1 1 -6 -20 z" fill="#E9DEC5"/>
  <!-- vine stem -->
  <path d="M60 108 C60 92 52 86 52 74 C52 64 60 60 60 50" fill="none" stroke="#E9DEC5" stroke-width="2" stroke-linecap="round"/>
  <!-- leaves -->
  <path d="M52 74 C42 72 38 64 40 58 C48 60 53 66 52 74 Z" fill="#4E5A3A" stroke="#B98A3E" stroke-width="1"/>
  <path d="M60 62 C70 60 74 52 72 46 C64 48 59 54 60 62 Z" fill="#4E5A3A" stroke="#B98A3E" stroke-width="1"/>
  <!-- grape cluster -->
  <g fill="#7C2A22" stroke="#B98A3E" stroke-width="0.8">
    <circle cx="60" cy="78" r="4.2"/><circle cx="53" cy="84" r="4.2"/><circle cx="67" cy="84" r="4.2"/>
    <circle cx="60" cy="90" r="4.2"/><circle cx="54" cy="94" r="3.6"/><circle cx="66" cy="94" r="3.6"/>
  </g>
  <!-- monogram -->
  <text x="60" y="46" font-family="Georgia,'Times New Roman',serif" font-size="20" font-style="italic" fill="#E9DEC5" text-anchor="middle">VV</text>
</svg>
