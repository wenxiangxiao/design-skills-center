<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" width="360" height="130" role="img" aria-label="千囍補習班 CRAM2K">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5F7FA"/>
      <stop offset="0.45" stop-color="#C6CEDA"/>
      <stop offset="0.5" stop-color="#8A93A0"/>
      <stop offset="0.52" stop-color="#5A6270"/>
      <stop offset="0.55" stop-color="#B8C0CC"/>
      <stop offset="1" stop-color="#E8ECF0"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00C2CB"/>
      <stop offset="1" stop-color="#FF4FA3"/>
    </linearGradient>
  </defs>
  <!-- CD-ROM disc mark -->
  <g transform="translate(56 64)">
    <circle r="42" fill="#16181D"/>
    <circle r="42" fill="none" stroke="url(#neon)" stroke-width="4"/>
    <circle r="30" fill="none" stroke="#00C2CB" stroke-width="2" opacity="0.5"/>
    <path d="M0 -42 A42 42 0 0 1 34 -24" fill="none" stroke="#FFE14D" stroke-width="5"/>
    <circle r="10" fill="#E8ECF0"/>
    <circle r="10" fill="none" stroke="#FF4FA3" stroke-width="2.5"/>
    <text x="0" y="-16" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="11" fill="#00C2CB">2K</text>
  </g>
  <!-- 千囍 neon block -->
  <g transform="translate(112 20)">
    <rect x="0" y="0" width="64" height="34" fill="#FF4FA3"/>
    <text x="32" y="26" text-anchor="middle" font-family="'Noto Sans TC','PingFang TC',sans-serif" font-weight="900" font-size="26" fill="#16181D">千囍</text>
    <rect x="0" y="40" width="64" height="6" fill="#00C2CB"/>
  </g>
  <!-- CRAM2K chrome wordmark -->
  <text x="112" y="112" font-family="'Bungee','Arial Black',sans-serif" font-size="40" fill="url(#chrome)" stroke="#16181D" stroke-width="1.4" letter-spacing="1">CRAM2K</text>
</svg>
