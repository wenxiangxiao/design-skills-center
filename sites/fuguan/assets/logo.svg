<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 96" width="260" height="96" role="img" aria-label="復觀堂 標誌">
  <title>復觀堂 · 周易占筮</title>
  <!-- 復卦（地雷復）：初爻陽，餘五爻陰。自下而上 -->
  <g>
    <!-- 上爻(6) 陰 --><rect x="8" y="8"  width="26" height="7" fill="#C6A052"/><rect x="46" y="8"  width="26" height="7" fill="#C6A052"/>
    <!-- 五爻(5) 陰 --><rect x="8" y="21" width="26" height="7" fill="#C6A052"/><rect x="46" y="21" width="26" height="7" fill="#C6A052"/>
    <!-- 四爻(4) 陰 --><rect x="8" y="34" width="26" height="7" fill="#C6A052"/><rect x="46" y="34" width="26" height="7" fill="#C6A052"/>
    <!-- 三爻(3) 陰 --><rect x="8" y="47" width="26" height="7" fill="#C6A052"/><rect x="46" y="47" width="26" height="7" fill="#C6A052"/>
    <!-- 二爻(2) 陰 --><rect x="8" y="60" width="26" height="7" fill="#C6A052"/><rect x="46" y="60" width="26" height="7" fill="#C6A052"/>
    <!-- 初爻(1) 陽（一陽來復，硃色） --><rect x="8" y="73" width="64" height="7" fill="#C33E2A"/>
  </g>
  <g font-family="Noto Serif TC, serif" fill="#EADEC4">
    <text x="96" y="46" font-size="38" font-weight="900" letter-spacing="4">復觀堂</text>
    <text x="98" y="72" font-size="13" fill="#9C8F72" letter-spacing="6" font-family="DM Mono, monospace">FUGUAN · YI DIVINATION</text>
  </g>
</svg>
