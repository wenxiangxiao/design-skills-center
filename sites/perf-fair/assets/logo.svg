<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 96" width="300" height="96" role="img" aria-label="齒孔祭 PERFORATION FAIR">
  <title>齒孔祭 PERFORATION FAIR</title>
  <rect width="300" height="96" fill="#C7DBD4"/>
  <!-- 郵票本體與齒孔（以底色圓點咬出孔位） -->
  <g>
    <rect x="14" y="14" width="68" height="68" fill="#F0E6D2" stroke="#23292B" stroke-width="1.4"/>
    <rect x="20" y="20" width="56" height="56" fill="none" stroke="#23292B" stroke-width=".7"/>
    <g fill="#C7DBD4">
      <circle cx="14" cy="14" r="4"/><circle cx="31" cy="14" r="4"/><circle cx="48" cy="14" r="4"/><circle cx="65" cy="14" r="4"/><circle cx="82" cy="14" r="4"/>
      <circle cx="14" cy="82" r="4"/><circle cx="31" cy="82" r="4"/><circle cx="48" cy="82" r="4"/><circle cx="65" cy="82" r="4"/><circle cx="82" cy="82" r="4"/>
      <circle cx="14" cy="31" r="4"/><circle cx="14" cy="48" r="4"/><circle cx="14" cy="65" r="4"/>
      <circle cx="82" cy="31" r="4"/><circle cx="82" cy="48" r="4"/><circle cx="82" cy="65" r="4"/>
    </g>
    <!-- 面額 -->
    <text x="48" y="60" text-anchor="middle" font-family="Bodoni Moda,Georgia,serif" font-weight="900" font-size="34" fill="#C8503F">9</text>
    <text x="48" y="30" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="8" letter-spacing="1.6" fill="#4A5457">PF IX</text>
  </g>
  <!-- 郵戳：雙環 + 波狀銷線，壓在郵票右上 -->
  <g transform="translate(78 30) rotate(-9)" opacity=".9">
    <circle r="24" fill="none" stroke="#23292B" stroke-width="2"/>
    <circle r="17" fill="none" stroke="#23292B" stroke-width=".9"/>
    <path d="M-34 -7h68M-34 0h68M-34 7h68" stroke="#23292B" stroke-width="1.6" stroke-dasharray="5 3.4"/>
    <text y="-3" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="6.4" letter-spacing="1" fill="#23292B">CHIHKONG</text>
    <text y="9" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="6.4" letter-spacing="1" fill="#23292B">26.10.17</text>
  </g>
  <!-- 字標 -->
  <text x="118" y="52" font-family="Noto Serif TC,serif" font-weight="900" font-size="34" letter-spacing="4" fill="#23292B">齒孔祭</text>
  <text x="120" y="70" font-family="IBM Plex Mono,monospace" font-size="9.4" letter-spacing="5.2" fill="#4A5457">PERFORATION FAIR</text>
  <path d="M118 60h164" stroke="#C8503F" stroke-width="1.6"/>
</svg>
