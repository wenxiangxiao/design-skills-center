<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="明算會計師事務所 MINGSUAN">
  <rect x="2" y="2" width="116" height="116" fill="#F4F2EC" stroke="#16150F" stroke-width="4"/>
  <!-- column / row headers -->
  <line x1="2" y1="30" x2="118" y2="30" stroke="#16150F" stroke-width="2"/>
  <line x1="34" y1="2" x2="34" y2="118" stroke="#16150F" stroke-width="2"/>
  <!-- inner grid -->
  <line x1="66" y1="30" x2="66" y2="118" stroke="#CFCABB" stroke-width="2"/>
  <line x1="92" y1="30" x2="92" y2="118" stroke="#CFCABB" stroke-width="2"/>
  <line x1="34" y1="58" x2="118" y2="58" stroke="#CFCABB" stroke-width="2"/>
  <line x1="34" y1="86" x2="118" y2="86" stroke="#CFCABB" stroke-width="2"/>
  <!-- header labels -->
  <text x="18" y="22" font-family="'IBM Plex Mono',monospace" font-size="12" fill="#8C887E" text-anchor="middle">fx</text>
  <text x="50" y="22" font-family="'IBM Plex Mono',monospace" font-size="12" fill="#16150F" text-anchor="middle">A</text>
  <text x="16" y="50" font-family="'IBM Plex Mono',monospace" font-size="12" fill="#16150F" text-anchor="middle">1</text>
  <!-- selected cell -->
  <rect x="34" y="30" width="32" height="28" fill="none" stroke="#1B5FD0" stroke-width="3"/>
  <!-- ledger figure: positive green -->
  <text x="105" y="78" font-family="'IBM Plex Mono',monospace" font-size="15" fill="#1A7F5A" text-anchor="middle">+</text>
  <!-- sigma mark bottom-left cell -->
  <path d="M40 92 h20 l-13 12 13 12 h-20" fill="none" stroke="#16150F" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
