<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" role="img" aria-label="城南分館">
  <!-- index card -->
  <g>
    <rect x="6" y="10" width="60" height="52" fill="#E4D8BC" stroke="#1A1712" stroke-width="2.4"/>
    <!-- punch hole (catalogue rod) -->
    <circle cx="36" cy="56" r="4.4" fill="none" stroke="#1A1712" stroke-width="2.2"/>
    <!-- ruled lines -->
    <line x1="13" y1="24" x2="59" y2="24" stroke="#6A7A86" stroke-width="1.2"/>
    <line x1="13" y1="32" x2="59" y2="32" stroke="#6A7A86" stroke-width="1"/>
    <line x1="13" y1="40" x2="59" y2="40" stroke="#6A7A86" stroke-width="1"/>
    <!-- red margin -->
    <line x1="20" y1="12" x2="20" y2="60" stroke="#9E3B2E" stroke-width="1.4"/>
    <!-- call number -->
    <text x="24" y="21" font-family="'Courier Prime',monospace" font-size="7" fill="#1A1712">844.7</text>
    <!-- rubber stamp -->
    <g transform="rotate(-9 50 46)">
      <circle cx="50" cy="46" r="9.5" fill="none" stroke="#9E3B2E" stroke-width="1.6"/>
      <circle cx="50" cy="46" r="6" fill="none" stroke="#9E3B2E" stroke-width="0.9"/>
      <text x="50" y="48.6" text-anchor="middle" font-family="'Courier Prime',monospace" font-size="5.6" fill="#9E3B2E">城南</text>
    </g>
  </g>
  <!-- wordmark -->
  <g font-family="'Newsreader',serif" fill="#1A1712">
    <text x="82" y="38" font-size="27" font-weight="600" letter-spacing="1">城南分館</text>
    <text x="83" y="55" font-family="'Courier Prime',monospace" font-size="9.5" fill="#5C574C" letter-spacing="1.5">CHENGNAN BRANCH LIBRARY</text>
  </g>
</svg>
