<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 150" role="img" aria-label="光合髮室 Lumière Hair Atelier">
  <!-- 手繪太陽:雙筆觸圓圈 -->
  <g fill="none" stroke="#e05a3a" stroke-width="4" stroke-linecap="round">
    <path d="M62 34 q30 -6 34 28 q3 30 -31 33 q-33 2 -35 -29 q-1 -28 32 -32"/>
    <path d="M60 40 q25 -4 28 23 q2 24 -25 26" opacity=".45" stroke-width="2.5"/>
    <!-- 光線 -->
    <path d="M60 22 l-1 -12"/>
    <path d="M88 30 l8 -9"/>
    <path d="M32 32 l-8 -8"/>
    <path d="M102 62 l12 -1"/>
  </g>
  <!-- 葉子:光合作用 -->
  <path d="M44 76 q6 -20 30 -22 q-2 22 -24 25 q-4 1 -6 -3 z" fill="#5f7d54"/>
  <path d="M48 74 q10 -12 22 -16" fill="none" stroke="#f7f1e3" stroke-width="2" stroke-linecap="round"/>
  <!-- 剪刀小塗鴉 -->
  <g stroke="#33302b" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M78 92 l26 -18"/>
    <path d="M82 72 l24 20"/>
    <circle cx="76" cy="68" r="5.5"/>
    <circle cx="72" cy="94" r="5.5"/>
  </g>
  <!-- 中文字標 -->
  <text x="130" y="82" font-family="'Noto Serif TC','Songti TC',serif" font-weight="900" font-size="52" letter-spacing="8" fill="#33302b">光合髮室</text>
  <!-- 英文手寫 -->
  <text x="134" y="122" font-family="Caveat,'Segoe Script',cursive" font-size="30" fill="#e05a3a" transform="rotate(-1.5 134 122)">Lumière Hair Atelier</text>
  <!-- 螢光筆底線 -->
  <path d="M132 96 q90 8 246 1" fill="none" stroke="#ffe46b" stroke-width="12" stroke-linecap="round" opacity=".8"/>
  <path d="M132 96 q90 8 246 1" fill="none" stroke="#eba937" stroke-width="3" stroke-linecap="round" opacity=".5"/>
  <!-- 星星 -->
  <path d="M430 44 l4 10 10 2 -8 7 3 11 -9 -6 -10 5 3 -10 -7 -8 10 -1 z" fill="none" stroke="#eba937" stroke-width="3" stroke-linejoin="round"/>
</svg>
