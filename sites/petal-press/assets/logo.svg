<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" role="img" aria-label="疊瓣花社 Petal Press 雙色疊印字標">
  <!--
    疊瓣花社 Petal Press — 原創雙色疊印字標
    PINK PLATE 01: #FF48B0 (Fluorescent Pink)
    BLUE PLATE 02: #3255A4 (Medium Blue)
    兩版皆 mix-blend-mode:multiply,刻意錯位 3px,交疊處疊出 #321871
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&amp;family=Space+Grotesk:wght@500&amp;display=swap');
    .zh{font-family:'Noto Serif TC',serif;font-weight:900;font-size:64px;letter-spacing:6px}
    .en{font-family:'Space Grotesk',sans-serif;font-size:15px;letter-spacing:11px}
    .plate{mix-blend-mode:multiply}
  </style>
  <rect width="560" height="200" fill="#F7F1E3"/>

  <!-- 對位十字 -->
  <g stroke="#3255A4" stroke-width="1.5" fill="none" opacity=".9">
    <circle cx="24" cy="24" r="7"/><path d="M24 12v24M12 24h24"/>
    <circle cx="536" cy="176" r="7"/><path d="M536 164v24M524 176h24"/>
  </g>
  <g stroke="#FF48B0" stroke-width="1.5" fill="none" opacity=".9">
    <circle cx="536" cy="24" r="7"/><path d="M536 12v24M524 24h24"/>
    <circle cx="24" cy="176" r="7"/><path d="M24 164v24M12 176h24"/>
  </g>

  <!-- 花標:藍版(後、右下錯位) -->
  <g class="plate" fill="#3255A4">
    <g transform="translate(97 92)">
      <ellipse rx="13" ry="30"/>
      <ellipse rx="13" ry="30" transform="rotate(72)"/>
      <ellipse rx="13" ry="30" transform="rotate(144)"/>
      <ellipse rx="13" ry="30" transform="rotate(216)"/>
      <ellipse rx="13" ry="30" transform="rotate(288)"/>
    </g>
    <path d="M94 122 C90 146 100 158 94 174" stroke="#3255A4" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse cx="78" cy="152" rx="16" ry="6" transform="rotate(-30 78 152)"/>
  </g>
  <!-- 花標:粉版(前、左上) -->
  <g class="plate" fill="#FF48B0">
    <g transform="translate(84 79)">
      <ellipse rx="13" ry="30"/>
      <ellipse rx="13" ry="30" transform="rotate(72)"/>
      <ellipse rx="13" ry="30" transform="rotate(144)"/>
      <ellipse rx="13" ry="30" transform="rotate(216)"/>
      <ellipse rx="13" ry="30" transform="rotate(288)"/>
      <circle r="11" fill="#FFE800"/>
    </g>
  </g>

  <!-- 字標:藍版(右下錯位 3px) -->
  <g class="plate">
    <text class="zh" x="177" y="113" fill="#3255A4">疊瓣花社</text>
  </g>
  <!-- 字標:粉版 -->
  <g class="plate">
    <text class="zh" x="174" y="110" fill="#FF48B0">疊瓣花社</text>
  </g>

  <!-- 英文副標(藍單版)與版號 -->
  <text class="en" x="178" y="148" fill="#3255A4">PETAL PRESS · TAICHUNG</text>
  <text class="en" x="178" y="176" fill="#FF48B0" style="font-size:10px;letter-spacing:6px">PINK PLATE 01 / BLUE PLATE 02</text>
</svg>
