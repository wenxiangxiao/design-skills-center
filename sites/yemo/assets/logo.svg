<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 76" role="img" aria-label="野墨花室 Wild Ink Floral">
  <!-- woodblock ink stamp: carved bloom -->
  <g transform="translate(6,6)">
    <rect width="64" height="64" fill="#1E1A15"/>
    <!-- petals as bold black on ochre, white gouge cuts -->
    <g fill="#C98A2B">
      <path d="M32 8 C40 16 40 24 32 30 C24 24 24 16 32 8 Z"/>
      <path d="M56 32 C48 40 40 40 34 32 C40 24 48 24 56 32 Z"/>
      <path d="M32 56 C24 48 24 40 32 34 C40 40 40 48 32 56 Z"/>
      <path d="M8 32 C16 24 24 24 30 32 C24 40 16 40 8 32 Z"/>
    </g>
    <circle cx="32" cy="32" r="7" fill="#B5502F"/>
    <!-- white gouge marks -->
    <g stroke="#EFE7D6" stroke-width="1.4" fill="none" opacity="0.9" stroke-linecap="round">
      <path d="M32 12 C34 18 34 22 32 27"/>
      <path d="M52 32 C46 34 42 34 37 32"/>
      <path d="M32 52 C30 46 30 42 32 37"/>
      <path d="M12 32 C18 30 22 30 27 32"/>
    </g>
  </g>
  <text x="86" y="34" font-family="'Times New Roman',Georgia,serif" font-size="27" font-weight="700" fill="#1E1A15" letter-spacing="4">野墨花室</text>
  <text x="87" y="58" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#445039" letter-spacing="3">Wild Ink Floral</text>
</svg>
