<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" role="img" aria-label="搶風線帆船俱樂部 TACKLINE 標誌：一支繫著三面信號旗的旗繩，旗繩本身即為品牌名稱中的「線」">
 <title>TACKLINE 搶風線帆船俱樂部</title>
 <rect width="320" height="120" fill="#16467F"/>
 <!-- 旗繩 halyard：由左下拉向右上，繩上掛三面旗（T-A-K，本社的縮寫旗令） -->
 <path d="M14,108 L14,16" stroke="#C9A46A" stroke-width="6"/>
 <circle cx="14" cy="12" r="6" fill="#F5C518"/>
 <path d="M14,20 C90,26 190,20 306,14" stroke="#C9A46A" stroke-width="3" fill="none"/>
 <!-- T 旗：紅白藍直條 -->
 <g transform="translate(34,24)">
  <rect x="0" y="0" width="17" height="34" fill="#DA2B24"/>
  <rect x="17" y="0" width="17" height="34" fill="#F4F4EE"/>
  <rect x="34" y="0" width="17" height="34" fill="#0B5FB0"/>
 </g>
 <!-- A 旗：白藍燕尾 -->
 <g transform="translate(96,23)">
  <rect x="0" y="0" width="25" height="34" fill="#F4F4EE"/>
  <polygon points="25,0 51,0 41,17 51,34 25,34" fill="#0B5FB0"/>
 </g>
 <!-- K 旗：黃藍對分 -->
 <g transform="translate(158,22)">
  <rect x="0" y="0" width="25" height="34" fill="#F5C518"/>
  <rect x="25" y="0" width="26" height="34" fill="#0B5FB0"/>
 </g>
 <!-- 船艏剪影與航跡：品牌的「搶風」 -->
 <path d="M232,74 L246,26 L258,74 L245,80 Z" fill="#F0F1EA"/>
 <path d="M246,30 L246,78" stroke="#16467F" stroke-width="2.4"/>
 <path d="M214,92 C238,86 268,88 292,80" stroke="#F5C518" stroke-width="2.4" fill="none" stroke-dasharray="7 6"/>
 <text x="34" y="98" font-family="Archivo, Helvetica, Arial, sans-serif" font-size="30" font-weight="900" letter-spacing="-1" fill="#F0F1EA">TACK<tspan fill="#F5C518">LINE</tspan></text>
 <text x="34" y="113" font-family="'Noto Sans TC', sans-serif" font-size="11" letter-spacing="5" fill="#C9A46A">搶風線帆船俱樂部</text>
</svg>
