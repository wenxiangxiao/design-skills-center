   Everything deterministic from genome data; same genome => same fish. */
(function(root){
"use strict";
/* ---- deterministic RNG ---- */
function fnv(str){let h=0x811c9dc5>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,0x01000193)>>>0;}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function rngFrom(x){return mulberry32(typeof x==="string"?fnv(x):(x>>>0));}

/* ---- colours (koi content colours, not page skin) ---- */
var COL={
  shiro:"#F4EEE0",   // 白地 white ground
  beni:"#C8331F",    // 緋 hi (red) — deep persimmon
  beniHi:"#E0512E",  // 差し緋 brighter red edge
  sumi:"#211E1B",    // 墨 black
  asagi:"#5E7C90",   // 浅葱 blue-grey (for asagi/utsuri sheen)
  key:"#1B1815",     // 主版 key-block outline
  eye:"#2A2622"
};

/* ---- blotch gene: {x,y,s,rot,k} in body-normalised coords (x -1..1 across, y 0..1 nose->tail) ---- */
function randBlotch(rng){return {x:(rng()*2-1)*0.72, y:0.10+rng()*0.78, s:0.10+rng()*0.26, rot:rng()*Math.PI*2, k:(rng()*1e9)|0};}

/* ---- a genome ---- */
function randomGenome(seedOrRng){
  var rng=(typeof seedOrRng==="function")?seedOrRng:rngFrom(seedOrRng===undefined?(Math.random()*1e9|0):seedOrRng);
  function allele(pDom){return rng()<pDom?1:0;}
  // ground: 1 = W (white ground, dominant), 0 = K (black ground)
  var ground=[allele(0.62),allele(0.62)];
  // sumi presence on white ground: 1 = S dominant (has black markings)
  var sumi=[allele(0.5),allele(0.5)];
  var nHi=2+((rng()*4)|0), nSu=1+((rng()*3)|0);
  var hiSeeds=[],suSeeds=[];
  for(var i=0;i<nHi;i++)hiSeeds.push(randBlotch(rng));
  for(var j=0;j<nSu;j++)suSeeds.push(randBlotch(rng));
  return {
    ground:ground, sumi:sumi,
    hiAmt:0.28+rng()*0.55,      // polygenic red coverage tendency
    hiSeeds:hiSeeds, suSeeds:suSeeds,
    bodyQ:0.35+rng()*0.5,       // 体型 conformation
    skinQ:0.35+rng()*0.5,       // 白地/質 skin quality
    edgeQ:0.35+rng()*0.5,       // 際 (kiwa) pattern-edge crispness
    id:"F"+((rng()*1e6)|0).toString(36).toUpperCase(),
    sire:null, dam:null, gen:1
  };
}

/* ---- inheritance ---- */
function pick(rng,arr){return arr[rng()<0.5?0:1];}
function crossSeeds(rng,a,b){
  // recombine two parent blotch sets: draw n from combined pool, jitter positions (mutation)
  var pool=a.concat(b), out=[], n=Math.max(1,Math.round((a.length+b.length)/2 + (rng()<0.18?(rng()<0.5?-1:1):0)));
  for(var i=0;i<n;i++){
    var g=pool[(rng()*pool.length)|0]||randBlotch(rng);
    var m={x:clamp(g.x+(rng()-0.5)*0.14,-0.9,0.9), y:clamp(g.y+(rng()-0.5)*0.12,0.05,0.95),
           s:clamp(g.s+(rng()-0.5)*0.06,0.07,0.4), rot:g.rot+(rng()-0.5)*0.6, k:(g.k^(rng()*1e9|0))|0};
    if(rng()<0.06)m=randBlotch(rng); // de-novo mutation blotch
    out.push(m);
  }
  return out;
}
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function quant(rng,a,b,mrate){var v=(a+b)/2*0.55+Math.max(a,b)*0.45+(rng()-0.5)*0.10; if(rng()<mrate)v+=(rng()-0.5)*0.3; return clamp(v,0.02,0.99);}

  var g={
    ground:[pick(rng,sire.ground),pick(rng,dam.ground)],
    sumi:[pick(rng,sire.sumi),pick(rng,dam.sumi)],
    hiAmt:quant(rng,sire.hiAmt,dam.hiAmt,0.10),
    hiSeeds:crossSeeds(rng,sire.hiSeeds,dam.hiSeeds),
    suSeeds:crossSeeds(rng,sire.suSeeds,dam.suSeeds),
    bodyQ:quant(rng,sire.bodyQ,dam.bodyQ,0.08),
    skinQ:quant(rng,sire.skinQ,dam.skinQ,0.08),
    edgeQ:quant(rng,sire.edgeQ,dam.edgeQ,0.08),
    sire:sire.id, dam:dam.id, gen:Math.max(sire.gen,dam.gen)+1
  };
  // rare mutation flips a ground/sumi allele
  if(rng()<0.03)g.ground[(rng()*2)|0]^=1;
  if(rng()<0.03)g.sumi[(rng()*2)|0]^=1;
  g.id="F"+((rng()*1e6)|0).toString(36).toUpperCase();
  return g;
}

/* ---- phenotype: variety classification ---- */
function pheno(g){
  var whiteGround=(g.ground[0]||g.ground[1])?true:false; // W dominant
  var hasSumi=(g.sumi[0]||g.sumi[1])?true:false;         // S dominant
  var red=g.hiAmt;
  var variety, code;
  if(whiteGround){
    if(red>=0.14 && hasSumi){variety="大正三色"; code="sanke";}
    else if(red>=0.14){variety="紅白"; code="kohaku";}
    else if(hasSumi){variety="白別甲"; code="bekko";}
    else {variety="白無地"; code="mujiWhite";}
  }else{ // black ground
    if(red>=0.14 && hasSumi){variety="昭和三色"; code="showa";}
    else if(red>=0.14){variety="緋写り"; code="hiutsuri";}
    else if(hasSumi){variety="白写り"; code="shiroutsuri";}
    else {variety="烏鯉"; code="karasu";}
  }
  return {variety:variety, code:code, whiteGround:whiteGround, hasSumi:hasSumi, red:red,
    het:{ground:g.ground[0]!==g.ground[1], sumi:g.sumi[0]!==g.sumi[1]}};
}

/* ---- judging: score toward a target variety standard (0..100) ---- */
var TARGETS={
  kohaku:{name:"紅白", want:"kohaku"},
  sanke:{name:"大正三色", want:"sanke"},
  showa:{name:"昭和三色", want:"showa"}
};
function judge(g,targetKey){
  var p=pheno(g), t=TARGETS[targetKey]||TARGETS.kohaku;
  var match=(p.code===t.want)?1:0;
  // pattern balance: red coverage ideal window depends on target
  var ideal=targetKey==="showa"?0.42:targetKey==="sanke"?0.34:0.40;
  var patt=1-Math.min(1,Math.abs(p.red-ideal)/0.40);
  var body=g.bodyQ, skin=g.skinQ, edge=g.edgeQ;
  // sumi requirement
  var sumiOk=(t.want==="kohaku")?(p.hasSumi?0.4:1):(p.hasSumi?1:0.15);
  // weighted (体型35 / 質25 / 模様25 / 品種適合15 via match&sumi)
  var raw=(body*35 + ((skin*0.6+edge*0.4))*25 + (patt*0.7+sumiOk*0.3)*25 + (match?15:2));
  var score=Math.round(clamp(raw,0,100));
  var grade = score>=88?"総合優勝": score>=80?"金賞": score>=70?"銀賞": score>=58?"入選":"無鑑査";
  return {score:score, grade:grade, match:!!match, variety:p.variety,
    parts:{body:Math.round(body*100), skin:Math.round(skin*100), edge:Math.round(edge*100), patt:Math.round(patt*100)}};
}

/* ---- blob polygon from a blotch gene (organic, crisp kiwa) ---- */
function blobPath(cx,cy,rad,seed,rot){
  var rng=mulberry32((seed>>>0)||1), pts=12, d="";
  for(var i=0;i<pts;i++){
    var a=rot+ i/pts*Math.PI*2;
    var rr=rad*(0.72+rng()*0.55);
    var x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr*1.08;
    d+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1);
  }
  return d+"Z";
}

/* body outline in viewBox 0 0 120 300 (head up), centreline x=60 */
var BODY="M60 12 C74 12 90 30 91 70 C93 120 86 180 78 224 "+
         "L96 292 L60 266 L24 292 L42 224 "+
         "C34 180 27 120 29 70 C30 30 46 12 60 12 Z";
function inBody(nx,ny){ // rough test in normalised coords x -1..1, y 0..1
  var half=0.62*Math.sin(Math.min(1,ny*1.15)*Math.PI*0.86)+0.06;
  return Math.abs(nx)<=half && ny>0.02 && ny<0.96;
}
function toVB(nx,ny){return {x:60+nx*33, y:12+ny*250};}

/* draw one koi -> inner SVG markup (no <svg> wrapper). scale via group transform outside. */
function drawKoi(g,opts){
  opts=opts||{};
  var p=pheno(g);
  var baseSkin=p.whiteGround?COL.shiro:COL.sumi;
  var s='';
  // shadow/base body
  s+='<path d="'+BODY+'" fill="'+baseSkin+'" stroke="'+COL.key+'" stroke-width="'+(opts.line||2.2)+'"/>';
  // build a clip for body so markings stay inside
  var cid="kc"+(opts.uid||((Math.random()*1e6)|0));
  s='<defs><clipPath id="'+cid+'"><path d="'+BODY+'"/></clipPath></defs>'+s;
  var mk='<g clip-path="url(#'+cid+')">';
  function paint(seeds,color,amt,jitterSeed){
    for(var i=0;i<seeds.length;i++){
      var b=seeds[i];
      var v=toVB(b.x,b.y);
      var rad=(b.s*48)*(0.72+amt*0.95);
      mk+='<path d="'+blobPath(v.x,v.y,rad,b.k^(jitterSeed||0),b.rot)+'" fill="'+color+'"/>';
    }
  }
  if(p.whiteGround){
    // Kohaku/Sanke: red on white, then sumi (if any)
    if(p.red>=0.05) paint(g.hiSeeds,COL.beni,g.hiAmt,101);
    if(p.hasSumi) paint(g.suSeeds,COL.sumi,0.6,202);
  }else{
    // Showa/Utsuri: black base, paint white (shiroji) then red
    paint(g.suSeeds,COL.shiro,0.7,303);           // shiroji
    if(p.red>=0.05) paint(g.hiSeeds,COL.beni,g.hiAmt,404);
    // motoguro-ish dark at pectoral base already from base
  }
  mk+='</g>';
  s+=mk;
  // pectoral fins (top view, near shoulder)
  s+='<path d="M31 78 C16 84 10 104 18 116 C26 108 31 96 33 86 Z" fill="'+baseSkin+'" stroke="'+COL.key+'" stroke-width="'+(opts.line||2.2)*0.7+'"/>';
  s+='<path d="M89 78 C104 84 110 104 102 116 C94 108 89 96 87 86 Z" fill="'+baseSkin+'" stroke="'+COL.key+'" stroke-width="'+(opts.line||2.2)*0.7+'"/>';
  // eyes + subtle key ridge
  s+='<circle cx="52" cy="34" r="3.1" fill="'+COL.eye+'"/><circle cx="68" cy="34" r="3.1" fill="'+COL.eye+'"/>';
  s+='<path d="M60 14 C60 60 60 160 60 250" stroke="'+COL.key+'" stroke-width="0.9" opacity="0.25" fill="none"/>';
  return s;
}
function koiSVG(g,vb){ // full standalone svg string
  vb=vb||120;
  return '<svg viewBox="0 0 120 300" width="'+vb+'" xmlns="http://www.w3.org/2000/svg">'+drawKoi(g,{uid:(g.id||"x")})+'</svg>';
}

var API={fnv:fnv,rngFrom:rngFrom,randomGenome:randomGenome,breed:breed,pheno:pheno,judge:judge,
  drawKoi:drawKoi,koiSVG:koiSVG,COL:COL,TARGETS:TARGETS,BODY:BODY};
if(typeof module!=="undefined"&&module.exports)module.exports=API;
root.KOI=API;
})(typeof window!=="undefined"?window:globalThis);
</script><script>(function koiAppIndex(){
  var KOI=window.KOI, UIDC=0;
  var TNAME={kohaku:"紅白",sanke:"大正三色",showa:"昭和三色"};
  var app=document.getElementById("app");
  var S={target:"kohaku",gen:1,pond:[],parents:[],phase:"select",fry:null,kept:{},best:null,champ:null};
  function founders(){var r=KOI.rngFrom("kinrin-founders-2026"),a=[];for(var i=0;i<6;i++)a.push(KOI.randomGenome(r));return a;}
  function reset(){S.gen=1;S.pond=founders();S.parents=[];S.phase="select";S.fry=null;S.kept={};S.best=null;S.champ=null;render();}
  function koiFig(g,w){var uid=(++UIDC);var h=Math.round(w*2.5);

  function bestInPond(){var b=null;for(var i=0;i<S.pond.length;i++){var j=KOI.judge(S.pond[i],S.target);if(!b||j.score>b.j.score)b={g:S.pond[i],j:j};}return b;}
  function seal(id){var h=KOI.fnv("seal|"+id),r=KOI.rngFrom(h),sv='<svg viewBox="0 0 80 80" width="72" height="72" aria-hidden="true"><rect width="80" height="80" rx="6" fill="#C8331F"/>';
    for(var k=0;k<5;k++){var a=r()*6.28,x=40+Math.cos(a)*(14+r()*18),y=40+Math.sin(a)*(14+r()*18);sv+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(4+r()*10).toFixed(1)+'" height="'+(4+r()*10).toFixed(1)+'" fill="#EDE4CE" opacity="0.9"/>';}
    sv+='<text x="40" y="47" font-family="Noto Serif TC,serif" font-size="24" font-weight="900" text-anchor="middle" fill="#EDE4CE">錦</text></svg>';return sv;}
  function checkChamp(){var b=bestInPond();if(!b)return;
    if(!S.best||b.j.score>S.best.score)S.best={score:b.j.score,id:b.g.id,gen:S.gen};
    if(b.j.score>=88&&b.j.match&&!S.champ)S.champ=b.g;}
  function autodemo(){
    // greedy: each gen breed the two best-scoring fish toward target, keep best 5 of 8 fry

    while(guard++<16 && !S.champ){
      // rank pond

      var matched=ranked.filter(function(x){return x.j.match;});

  }

    S.fry=[];for(var i=0;i<8;i++)S.fry.push(KOI.breed(pa,pb,r));

  }
  function nextGen(){

    window.scrollTo({top:0,behavior:(matchMedia("(prefers-reduced-motion:reduce)").matches?"auto":"smooth")});
  }
  function render(){
    checkChamp();
    var b=bestInPond();
    var html='';
    /* opening: broodpond-first — pond is the first screen */
    html+='<section class="lead"><div class="wrap">'
      +'<div class="leadgrid">'
      +'<div><h1 class="mincho">選育台</h1>'
      +'<p class="lede">你不能畫一尾魚。你只能選親魚——花紋是牠基因型的表現，緋斑的位置、墨的有無、白地的質，全由對偶基因的顯隱、多基因的加成、減數分裂的重組與偶發的突變決定。要育出一尾夠格的<b>'+TNAME[S.target]+'</b>，得一代一代選下去。</p>'
      +'<div class="targ" role="group" aria-label="目標品種"><span class="tl mono">目標品種</span>'
      +['kohaku','sanke','showa'].map(function(t){return '<button class="tbtn'+(S.target===t?' on':'')+'" data-act="target" data-t="'+t+'">'+TNAME[t]+'</button>';}).join('')
      +'</div></div>'
      +'<div class="stat card"><div class="st"><span>世代</span><b class="mono">第 '+S.gen+' 代</b></div>'
      +'<div class="st"><span>本池最佳</span><b class="mono">'+(b?b.j.score:'—')+' 点</b></div>'
      +'<div class="st"><span>歷代最高</span><b class="mono">'+(S.best?S.best.score:'—')+' 点</b></div>'
      +'<div class="grd">'+(b?'<span class="stamp g-'+b.j.grade+'">'+b.j.grade+'</span>':'')+'</div></div>'
      +'</div></div></section>';

    /* champion certificate */

        +'<div class="cert-koi">'+koiFig(S.champ,120)+'</div>'
        +'<div class="cert-body"><div class="mono ct-h">認定書 / GRAND CHAMPION</div>'
        +'<h2 class="mincho">'+cj.variety+'　総合優勝</h2>'
        +'<p>個体 <b class="mono">'+S.champ.id+'</b>　第 '+S.champ.gen+' 代　得点 <b>'+cj.score+'</b>／100</p>'

    if(S.phase==="select"){
      html+='<div class="pondgrid">';
      S.pond.forEach(function(g){var j=KOI.judge(g,S.target),sel=S.parents.indexOf(g.id)>=0,p=KOI.pheno(g);

      html+='</div>';

      html+='<div class="actbar"><button class="btn" data-act="next"'+(nk<2?' disabled':'')+'>次世代へ（第 '+(S.gen+1)+' 代）→</button>'

      html+='<section class="wrap"><div class="shead"><div class="vt">品評</div><div class="sx"><h2>品評席 — 本池最佳個体の採点</h2>'
        +'<p>依錦鯉品評基準：体型 35・質 25・模様 25・品種適合 15。個体 <b class="mono">'+b.g.id+'</b>（'+b.j.variety+'）。'+(b.j.match?'':'目前尚非目標品種，適合分偏低。')+'</p></div></div>'
        +'<div class="bars card">'

        +'<div class="total mono">総合 '+b.j.score+' 点　—　'+b.j.grade+'</div></div></section>';}

  }
  function bar(lbl,v){return '<div class="barrow"><span class="bl">'+lbl+'</span><span class="bt"><i style="width:'+v+'%"></i></span><b class="mono">'+v+'</b></div>';}
  function champCmt(j){var p=j.parts;var w=p.body>p.skin&&p.body>p.patt?"体型が骨格として通っている":p.patt>=p.body?"緋の配置が背に沿って区切れている":"白地に濁りが少ない";
    return "審査所見：この個体は"+w+"。総合"+j.score+"点、"+j.grade+"。次代はこの血を残し、際のさらに鋭い個体を分けたい。";}
  document.addEventListener("click",function(e){
    var t=e.target.closest("[data-act]");if(!t)return;var a=t.getAttribute("data-act");
