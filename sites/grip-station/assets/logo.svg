<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140" role="img" aria-label="岩站 GRIP STATION 標誌">
  <title>岩站 GRIP STATION</title>
  <defs>
    <filter id="lspray" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="420" height="140" fill="#101418"/>

  <!-- 指標牌本體：藍底 + 橘色左封邊 -->
  <rect x="16" y="18" width="388" height="104" fill="#2D8CFF"/>
  <rect x="16" y="18" width="12" height="104" fill="#FF6A13"/>

  <!-- 標記：向上的路線箭頭 + 三顆岩點（噴模質感） -->
  <g filter="url(#lspray)">
    <path d="M48 96 L74 54 L100 96 L89 96 L74 78 L59 96 Z" fill="#FFFFFF"/>
    <circle cx="74" cy="112" r="7" fill="#101418"/>
    <circle cx="52" cy="42" r="5" fill="#101418"/>
    <circle cx="96" cy="42" r="5" fill="#101418"/>
  </g>

  <!-- 字標 -->
  <text x="128" y="82" font-family="Noto Sans TC, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" letter-spacing="4">岩站</text>
  <text x="248" y="66" font-family="Archivo, Helvetica, sans-serif" font-weight="800" font-size="21" fill="#FFFFFF" letter-spacing="4.5">GRIP</text>
  <text x="248" y="92" font-family="Archivo, Helvetica, sans-serif" font-weight="800" font-size="21" fill="#0E2E56" letter-spacing="4.5">STATION</text>

  <!-- 難度色碼帶 -->
  <g>
    <rect x="16" y="122" width="55.4" height="6" fill="#E9E7E0"/>
    <rect x="71.4" y="122" width="55.4" height="6" fill="#FFD400"/>
    <rect x="126.8" y="122" width="55.4" height="6" fill="#38C46B"/>
    <rect x="182.2" y="122" width="55.4" height="6" fill="#2D8CFF"/>
    <rect x="237.6" y="122" width="55.4" height="6" fill="#FF3B30"/>
    <rect x="293" y="122" width="55.4" height="6" fill="#9B5CFF"/>
    <rect x="348.4" y="122" width="55.6" height="6" fill="#0B0E11"/>
  </g>
</svg>
