<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 92" role="img" aria-label="琥室 調香所 HŪSHÌ ATELIER">
  <rect width="260" height="92" fill="#17110B"/>
  <!-- drydown curve mark: rise then long tail = a fragrance's life -->
  <g transform="translate(14,12)">
    <rect x="0" y="0" width="68" height="68" fill="none" stroke="#5C4526" stroke-width="1"/>
    <!-- gridlines -->
    <line x1="14" y1="6" x2="14" y2="62" stroke="#3E2F1D" stroke-width="1"/>
    <line x1="30" y1="6" x2="30" y2="62" stroke="#3E2F1D" stroke-width="1"/>
    <line x1="50" y1="6" x2="50" y2="62" stroke="#3E2F1D" stroke-width="1"/>
    <!-- area wash -->
    <path d="M4 62 C10 62 12 14 20 14 C29 14 27 40 40 44 C52 47 56 55 64 56 L64 62 Z" fill="#8A6A3E" fill-opacity=".30"/>
    <!-- curve -->
    <path d="M4 62 C10 62 12 14 20 14 C29 14 27 40 40 44 C52 47 56 55 64 56" fill="none" stroke="#B79C6B" stroke-width="2"/>
    <circle cx="20" cy="14" r="2.4" fill="#EFE4CC"/>
  </g>
  <text x="98" y="44" font-family="'Noto Serif TC',serif" font-weight="900" font-size="34" letter-spacing="6" fill="#EFE4CC">琥室</text>
  <text x="99" y="66" font-family="'Spline Sans Mono',monospace" font-size="10.5" letter-spacing="5" fill="#8A6A3E">HŪSHÌ ATELIER</text>
  <text x="99" y="80" font-family="'Spline Sans Mono',monospace" font-size="8" letter-spacing="2.4" fill="#5C4526">獨立調香所 · 台南</text>
</svg>
