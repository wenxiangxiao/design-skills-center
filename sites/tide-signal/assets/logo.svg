<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 104" role="img" aria-label="潮汐訊號 TIDE SIGNAL">
  <!-- 潮汐訊號 TIDE SIGNAL — 焊點 + 波形 標誌（原創） -->
  <rect width="360" height="104" rx="12" fill="#0a120d"/>
  <rect x="6" y="6" width="348" height="92" rx="8" fill="none" stroke="#c9803a" stroke-opacity=".28"/>

  <!-- 左焊點（雙環圓墊） -->
  <circle cx="34" cy="52" r="13" fill="none" stroke="#c9803a" stroke-width="4"/>
  <circle cx="34" cy="52" r="4" fill="#d8a35c"/>

  <!-- 波形走線：焊點之間的訊號 -->
  <path d="M47 52 h14 l7 -22 l11 44 l10 -32 l8 20 l6 -10 h13"
        fill="none" stroke="#eda65a" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 右焊點（小圓墊 + 過孔） -->
  <circle cx="126" cy="52" r="8" fill="none" stroke="#c9803a" stroke-width="3.5"/>
  <circle cx="126" cy="52" r="2.4" fill="#0a120d" stroke="#d8a35c" stroke-width="1.5"/>

  <!-- 字標 -->
  <text x="152" y="47" font-family="'Noto Sans TC','PingFang TC',sans-serif" font-weight="600"
        font-size="26" fill="#dde4da" letter-spacing="4">潮汐訊號</text>
  <text x="152" y="74" font-family="'IBM Plex Mono','Space Mono',monospace"
        font-size="15" fill="#c9803a" letter-spacing="6">TIDE SIGNAL</text>

  <!-- 絲印小註 -->
  <text x="152" y="90" font-family="'IBM Plex Mono',monospace" font-size="7.5"
        fill="#8ba394" letter-spacing="2">KEELUNG HARBOR SOUNDSCAPE · REV 2.6</text>
</svg>
