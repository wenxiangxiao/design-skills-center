<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 88" role="img" aria-label="構成眼鏡 Compositie Optiek">
  <!-- 構成方塊標誌：紅黃藍構成 + 眼鏡剪影 -->
  <g>
    <rect x="4" y="4" width="80" height="80" fill="#FFFFFF" stroke="#161616" stroke-width="5"/>
    <rect x="6.5" y="6.5" width="30" height="30" fill="#CE2B1E"/>
    <rect x="62" y="6.5" width="19.5" height="46" fill="#F0C300"/>
    <rect x="6.5" y="62" width="20" height="19.5" fill="#1F4FA0"/>
    <line x1="4" y1="38.5" x2="84" y2="38.5" stroke="#161616" stroke-width="5"/>
    <line x1="38.5" y1="4" x2="38.5" y2="84" stroke="#161616" stroke-width="5"/>
    <line x1="60" y1="4" x2="60" y2="84" stroke="#161616" stroke-width="5"/>
    <line x1="4" y1="60" x2="84" y2="60" stroke="#161616" stroke-width="5"/>
    <!-- 眼鏡剪影，橫跨格線 -->
    <circle cx="29" cy="59" r="13.5" fill="#FFFFFF" fill-opacity="0.85" stroke="#161616" stroke-width="6"/>
    <circle cx="63" cy="59" r="13.5" fill="#FFFFFF" fill-opacity="0.85" stroke="#161616" stroke-width="6"/>
    <path d="M42.5 55.5 Q46 50.5 49.5 55.5" fill="none" stroke="#161616" stroke-width="5.5" stroke-linecap="round"/>
  </g>
  <!-- 字標 -->
  <g fill="#161616" font-family="'Archivo','Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">
    <text x="102" y="42" font-size="30" font-weight="800" letter-spacing="4">構成眼鏡</text>
    <text x="103" y="66" font-size="14.5" font-weight="600" letter-spacing="2.6">COMPOSITIE OPTIEK</text>
    <rect x="103" y="72" width="26" height="7" fill="#CE2B1E"/>
    <rect x="129" y="72" width="18" height="7" fill="#F0C300"/>
    <rect x="147" y="72" width="12" height="7" fill="#1F4FA0"/>
  </g>
</svg>
