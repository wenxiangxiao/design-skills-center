<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="起鐘換序研究會標誌">
  <rect width="120" height="120" fill="#12171C"/>
  <!-- change-grid ticks behind -->
  <g stroke="#2A3742" stroke-width="1">
    <line x1="18" y1="20" x2="102" y2="20"/><line x1="18" y1="100" x2="102" y2="100"/>
  </g>
  <!-- method line (blue line) weaving -->
  <polyline points="26,24 34,34 26,44 34,54 42,64 50,74 58,84 50,94"
    fill="none" stroke="#5C82A6" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
  <polyline points="94,24 86,34 94,44 86,54 78,64 70,74 62,84 70,94"
    fill="none" stroke="#5C82A6" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" opacity="0.5"/>
  <!-- bell (brass) -->
  <g>
    <path d="M60 30 C48 30 44 40 44 54 C44 66 40 74 34 80 L86 80 C80 74 76 66 76 54 C76 40 72 30 60 30 Z"
      fill="none" stroke="#C6A05A" stroke-width="3" stroke-linejoin="round"/>
    <rect x="55" y="22" width="10" height="9" rx="2" fill="none" stroke="#C6A05A" stroke-width="3"/>
    <line x1="34" y1="80" x2="86" y2="80" stroke="#C6A05A" stroke-width="3"/>
    <!-- clapper -->
    <circle cx="60" cy="74" r="4.5" fill="#C6A05A"/>
  </g>
  <!-- sally (red) -->
  <rect x="57" y="86" width="6" height="20" rx="3" fill="#BE4536"/>
</svg>
