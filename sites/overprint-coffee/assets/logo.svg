<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140" role="img" aria-label="疊印咖啡 Overprint Coffee 標誌">
  <rect width="440" height="140" fill="#F3ECDD"/>
  <!-- overprint mark: two offset rings printing a third colour where they meet -->
  <g transform="translate(70 70)">
    <circle cx="-10" cy="4" r="30" fill="none" stroke="#FF4D8D" stroke-width="9"/>
    <circle cx="10" cy="-2" r="30" fill="none" stroke="#1F9E8F" stroke-width="9" style="mix-blend-mode:multiply"/>
  </g>
  <!-- wordmark with overprint shadow -->
  <g transform="translate(128 0)">
    <text x="3" y="66" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="46" fill="#1F9E8F" style="mix-blend-mode:multiply" letter-spacing="-1">疊印</text>
    <text x="0" y="63" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="46" fill="#FF4D8D" letter-spacing="-1">疊印</text>
    <text x="0" y="100" font-family="'Space Mono',monospace" font-weight="700" font-size="17" fill="#22201C" letter-spacing="4">OVERPRINT</text>
    <text x="0" y="122" font-family="'Space Mono',monospace" font-size="11" fill="#FF7A2F" letter-spacing="3">COFFEE ROASTERS · 台南</text>
  </g>
  <!-- registration cross -->
  <g transform="translate(408 24)" stroke="#22201C" stroke-width="1"><path d="M0 -8V8M-8 0H8"/><circle r="4" fill="none"/></g>
</svg>
