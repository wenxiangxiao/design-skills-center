<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" role="img" aria-label="Maison Luminé monogram">
  <!-- Maison Luminé — monogram ML -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer ring -->
    <circle cx="120" cy="120" r="92" stroke="#CDB88C" stroke-width="1.2"/>
    <circle cx="120" cy="120" r="86" stroke="#E4DDCE" stroke-width="0.8"/>
    <!-- diamond accent -->
    <path d="M120 16 l6 8 -6 8 -6 -8 z" stroke="#B2925A" stroke-width="1.2"/>
    <!-- M -->
    <path d="M62 158 V84 L98 132 L134 84 V158" stroke="#211E19" stroke-width="3"/>
    <!-- L, interlaced -->
    <path d="M148 84 V166 H186" stroke="#B2925A" stroke-width="2.2"/>
    <!-- accent line beneath -->
    <path d="M84 236 H156" stroke="#B2925A" stroke-width="1"/>
  </g>
  <g fill="#211E19" font-family="Cormorant Garamond, Georgia, serif">
    <text x="120" y="264" text-anchor="middle" font-size="21" letter-spacing="7">MAISON LUMINÉ</text>
    <text x="120" y="288" text-anchor="middle" font-size="13" letter-spacing="9" fill="#7A7264">洛 米 內 婚 紗</text>
  </g>
</svg>
