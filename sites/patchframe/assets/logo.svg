<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" width="240" height="72" role="img" aria-label="補格影音修復所 PATCHFRAME">
  <rect width="240" height="72" fill="#0E0C0A"/>
  <!-- 記號：三條掃描線，中央一格被「補」回來 -->
  <g stroke="#EDE3D4" stroke-width="3.4" stroke-linecap="butt">
    <path d="M14 20h44"/>
    <path d="M14 36h12"/>
    <path d="M46 36h12"/>
    <path d="M14 52h44"/>
  </g>
  <rect x="27" y="29.5" width="18" height="13" fill="#9C8570"/>
  <rect x="27" y="29.5" width="18" height="13" fill="none" stroke="#EDE3D4" stroke-width="1.2"/>
  <!-- 齒孔 -->
  <g fill="#3A2F26">
    <rect x="14" y="8" width="6" height="5"/><rect x="26" y="8" width="6" height="5"/>
    <rect x="38" y="8" width="6" height="5"/><rect x="50" y="8" width="6" height="5"/>
    <rect x="14" y="59" width="6" height="5"/><rect x="26" y="59" width="6" height="5"/>
    <rect x="38" y="59" width="6" height="5"/><rect x="50" y="59" width="6" height="5"/>
  </g>
  <!-- 字標 -->
  <text x="78" y="40" font-family="'Noto Sans TC',sans-serif" font-weight="900" font-size="30" letter-spacing="6" fill="#EDE3D4">補格</text>
  <text x="79" y="56" font-family="'Martian Mono',monospace" font-size="8.5" letter-spacing="4.6" fill="#6B5A48">PATCHFRAME</text>
</svg>
