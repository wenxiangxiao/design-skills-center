<style>
:root{--yoi:#0E1730;--yoi2:#16203B;--kon:#0A1124;--nari:#EDE3CE;--aijiro:#8FA6C8;--shu:#E24A3B;--kin:#E7B84E;--line:#2A3757}
*{box-sizing:border-box}
body{margin:0;background:var(--yoi);color:var(--nari);font-family:"Zen Kaku Gothic New",sans-serif;line-height:1.7;-webkit-font-smoothing:antialiased}
h1,h2,h3,.mincho{font-family:"Shippori Mincho B1",serif}
a{color:var(--kin);text-decoration:none}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}
.content{padding-left:116px}
.rail{position:fixed;left:0;top:0;bottom:0;width:96px;z-index:40;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.rail .cord{position:absolute;top:0;bottom:0;left:50%;width:2px;background:repeating-linear-gradient(#3a2a12 0 6px,transparent 6px 10px);opacity:.7}
.rail .brand{margin:20px 0 14px;pointer-events:auto}.rail .brand svg{width:52px;height:52px;display:block}
.rail .lanterns{display:flex;flex-direction:column;gap:22px;position:relative;pointer-events:auto}
.lantern{position:relative;width:58px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:26px/20px;background:linear-gradient(#2a3352,#1a2340);border:2px solid #35406a;color:var(--aijiro);font-family:"Shippori Mincho B1",serif;font-weight:800;font-size:17px;writing-mode:vertical-rl;letter-spacing:2px;transition:.35s}
.lantern::before{content:"";position:absolute;top:-8px;width:14px;height:6px;border-radius:3px;background:#35406a}
.lantern:hover{color:var(--nari);border-color:var(--kin)}
.lantern[aria-current="page"]{background:radial-gradient(circle at 50% 40%,#F7C24A,#E24A3B);color:#3a1206;border-color:#ffd98a;box-shadow:0 0 22px 2px rgba(231,120,40,.55)}
.topbar{display:none}
.head{padding:56px 0 26px}
.kicker{font-size:13px;letter-spacing:5px;color:var(--kin);font-weight:700}
.head h1{font-size:clamp(28px,5vw,46px);margin:.3em 0 .2em;font-weight:800}
.head p{color:var(--aijiro);max-width:60ch}
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 6px}
.filters .grp{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filters .lbl{color:var(--aijiro);font-size:12px;letter-spacing:1px;margin-right:2px}
.chip{cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--aijiro);border-radius:999px;padding:6px 13px;font:inherit;font-size:13px;font-weight:700;transition:.2s}
.chip:hover{border-color:var(--kin);color:var(--nari)}
.chip[aria-pressed="true"]{background:var(--shu);border-color:var(--shu);color:#fff}
.count{color:var(--aijiro);font-size:13px;margin:6px 0 20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding-bottom:60px}
.card{background:var(--yoi2);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:.2s}
.card:hover{border-color:var(--kin);transform:translateY(-3px)}
.card .no{font-family:"Shippori Mincho B1",serif;font-weight:800;color:var(--kin);font-size:13px;letter-spacing:2px}
.card svg{width:100%;height:auto;display:block;background:#0b1330;border-radius:10px}
.card h3{margin:2px 0 0;font-size:17px;font-weight:800}
.card .meta{font-size:12.5px;color:var(--aijiro)}
.card .act{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:1px}
.act-jo{background:#1b3a2e;color:#7fd6a6}.act-ha{background:#3a2b16;color:#e7b84e}.act-kyu{background:#3a1a1a;color:#ff8a7a}
footer{border-top:1px solid var(--line);background:var(--kon);padding:34px 0 50px}
.fine{color:#5c6b8e;font-size:12px}
@media(max-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){.rail{display:none}.content{padding-left:0}
  .topbar{display:flex;position:sticky;top:0;z-index:40;gap:8px;padding:10px 14px;background:rgba(10,17,36,.94);border-bottom:1px solid var(--line);overflow-x:auto;align-items:center}
  .topbar .lg{font-family:"Shippori Mincho B1",serif;font-weight:800;color:var(--nari);font-size:16px;white-space:nowrap;margin-right:6px}
  .topbar a{padding:7px 12px;border-radius:999px;border:1px solid var(--line);color:var(--aijiro);font-size:14px;white-space:nowrap;font-weight:700}
  .topbar a[aria-current="page"]{background:var(--shu);border-color:var(--shu);color:#fff}
  .grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.grid{grid-template-columns:1fr 1fr}}

<div class="content"><div class="wrap">
  <div class="head">
    <div class="kicker">第五十四回 宵灣花火大会 ・ 全二十四演目</div>
    <h1>今夜の番組表</h1>
    <p>19:30 の一発目から 20:45 の大団円まで、序・破・急の三部構成でお届けします。各演目の紋は、玉の型と色から自動で描き起こしたものです（外部画像は一切使っていません）。型と色で絞り込めます。</p>
    <div class="filters">
      <div class="grp"><span class="lbl">部</span>
        <button class="chip" data-f="act" data-v="all" aria-pressed="true">すべて</button>
        <button class="chip" data-f="act" data-v="序">序</button>
        <button class="chip" data-f="act" data-v="破">破</button>
        <button class="chip" data-f="act" data-v="急">急</button>
      </div>
      <div class="grp"><span class="lbl">型</span>
        <button class="chip" data-f="type" data-v="all" aria-pressed="true">すべて</button>
        <button class="chip" data-f="type" data-v="botan">牡丹</button>
        <button class="chip" data-f="type" data-v="kiku">菊</button>
        <button class="chip" data-f="type" data-v="shin">芯入</button>
        <button class="chip" data-f="type" data-v="kamuro">冠菊</button>
        <button class="chip" data-f="type" data-v="senrin">千輪</button>
        <button class="chip" data-f="type" data-v="kata">型物</button>
        <button class="chip" data-f="type" data-v="yashi">椰子</button>
      </div>
    </div>

  </div>
  <div class="grid" id="grid"></div>
</div></div>

<footer><div class="wrap content"><p class="fine">※架空の花火大会「宵灣花火大会」のデモ番組表です。演目名・時刻はすべて架空。紋のデザインは玉の型と色から生成した表現で、実際の花火の見え方とは異なります。｜ Design Skills Center 館蔵</p></div></footer>

<script>
(function(){
"use strict";
var SALT={beni:"#FF5A6A",midori:"#57E39B",ao:"#5AA8FF",ki:"#FFD24D",kin:"#FFCF7A",gin:"#EAF2FF",murasaki:"#C58CF0"};
var SALTJP={beni:"紅",midori:"緑",ao:"青",ki:"黄",kin:"金",gin:"銀",murasaki:"紫"};
var TYPEJP={botan:"牡丹",kiku:"菊",shin:"芯入り",kamuro:"冠菊",senrin:"千輪",kata:"型物",yashi:"椰子"};

/* ---- hanabi-mon 生成器：玉の型と色から放射対称の紋を描く（全画像がこれ由来） ---- */
function mon(type, salt, seed){
  var C=SALT[salt], cx=90, cy=82, S=[];
  function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; }
  S.push("<svg viewBox='0 0 180 164' xmlns='http://www.w3.org/2000/svg'>");
  S.push("<rect width='180' height='164' fill='#0b1330'/>");
  // 打上台の火（下から一本）
  S.push("<line x1='"+cx+"' y1='150' x2='"+cx+"' y2='"+(cy+6)+"' stroke='#5c4a22' stroke-width='1.4' stroke-dasharray='2 3'/>");
  var petals = type==="senrin"?12 : (type==="yashi"?9 : 16);
  var R = type==="senrin"?0 : 60;
  if(type==="botan"){ // 点の輪
    for(var i=0;i<petals;i++){var a=i/petals*6.28;
      S.push(dot(cx+Math.cos(a)*R, cy+Math.sin(a)*R, 4.2, C));}
    S.push(dot(cx,cy,4,"#EAF2FF"));
  } else if(type==="kiku"){ // 尾を引く放射線
    for(var i=0;i<petals;i++){var a=i/petals*6.28;
      S.push(spoke(cx,cy,a,R,C,2.4)); S.push(dot(cx+Math.cos(a)*R,cy+Math.sin(a)*R,3.2,C));}
  } else if(type==="shin"){ // 二重芯
    for(var i=0;i<petals;i++){var a=i/petals*6.28;
      S.push(spoke(cx,cy,a,R,C,2.2)); S.push(dot(cx+Math.cos(a)*R,cy+Math.sin(a)*R,3,C));}
    for(var i=0;i<10;i++){var a=i/10*6.28; S.push(dot(cx+Math.cos(a)*30,cy+Math.sin(a)*30,3.4,"#EAF2FF"));}
    S.push("<circle cx='"+cx+"' cy='"+cy+"' r='12' fill='none' stroke='#EAF2FF' stroke-width='1.2' opacity='.5'/>");
  } else if(type==="kamuro"){ // 垂れる冠
    for(var i=0;i<petals;i++){var a=i/petals*6.28; var droop=Math.sin(a)>0?14:4;
      var ex=cx+Math.cos(a)*R, ey=cy+Math.sin(a)*R+droop+12;
      S.push("<path d='M"+cx+" "+cy+" Q"+(cx+Math.cos(a)*R*0.7)+" "+(cy+Math.sin(a)*R*0.7)+" "+ex+" "+ey+"' fill='none' stroke='#FFCF7A' stroke-width='2' opacity='.9'/>");
      S.push(dot(ex,ey,2.6,"#FFE9A8"));}
  } else if(type==="senrin"){ // 小割の集合
    for(var g=0;g<9;g++){var gx=cx+(rnd()-0.5)*110, gy=cy+(rnd()-0.5)*90;
      for(var i=0;i<7;i++){var a=i/7*6.28; S.push(dot(gx+Math.cos(a)*12,gy+Math.sin(a)*12,1.9,C));}
      S.push(dot(gx,gy,2,"#EAF2FF"));}
  } else if(type==="kata"){ // 型物：環
    S.push("<circle cx='"+cx+"' cy='"+cy+"' r='"+R+"' fill='none' stroke='"+C+"' stroke-width='4.5'/>");
    for(var i=0;i<20;i++){var a=i/20*6.28; S.push(dot(cx+Math.cos(a)*R,cy+Math.sin(a)*R,2.4,C));}
  } else if(type==="yashi"){ // 椰子：太い数本
    for(var i=0;i<petals;i++){var a=-1.1+i/(petals-1)*2.2;
      var ex=cx+Math.cos(a-1.57)*R, ey=cy+Math.sin(a-1.57)*R+20;
      S.push("<path d='M"+cx+" "+cy+" Q"+(cx+Math.cos(a-1.57)*R*0.6)+" "+(cy+Math.sin(a-1.57)*R*0.6-8)+" "+ex+" "+ey+"' fill='none' stroke='#FFCF7A' stroke-width='3.4' stroke-linecap='round'/>");
    }
  }
  S.push("</svg>");
  return S.join("");
  function dot(x,y,r,c){return "<circle cx='"+x.toFixed(1)+"' cy='"+y.toFixed(1)+"' r='"+r+"' fill='"+c+"'/>";}
  function spoke(x,y,a,r,c,w){return "<line x1='"+x+"' y1='"+y+"' x2='"+(x+Math.cos(a)*r).toFixed(1)+"' y2='"+(y+Math.sin(a)*r).toFixed(1)+"' stroke='"+c+"' stroke-width='"+w+"' stroke-linecap='round'/>";}
}

/* ---- 全24演目（架空・時刻順） ---- */
var TYPES=["botan","kiku","shin","kamuro","senrin","kata","yashi"];
var NAMES={
 botan:["紅牡丹","青一文字","八重の牡丹","湊の緋牡丹"],
 kiku:["黄金菊","銀点の菊","宵の大菊","昇り曲導付大菊"],
 shin:["二重芯 翠緑","三重芯 菫","芯入り群青","白芯の菊"],
 kamuro:["冠菊 大枝垂れ","金の冠","宵灣の柳","残菊しだれ"],
 senrin:["千輪 銀雨","紅の千輪","小割の群れ","万華の千輪"],
 kata:["環 ─ わのしるし","星ノ尾紋","結びの環","宵の一輪"],
 yashi:["椰子 大扇","浜風の椰子","黄金の椰子"]
};
var PROG=[];
var t0=1170; // 19:30 を分で
var acts=[["序",0,7],["破",7,17],["急",17,24]];
var nameIdx={botan:0,kiku:0,shin:0,kamuro:0,senrin:0,kata:0,yashi:0};
var plan=["botan","botan","nobori","kiku","botan","shin","shin",     // 序
          "kata","kiku","senrin","senrin","yashi","kiku","kiku","shin","kamuro","botan", // 破
          "botan","kamuro","kata","senrin","kiku","kamuro","kamuro"]; // 急
var salts=["beni","ao","ki","kin","midori","murasaki","gin","ki","kin","gin","beni","kin","ao","beni","midori","kin","ki","beni","kin","ki","gin","murasaki","kin","kin"];
for(var i=0;i<24;i++){
  var ty=plan[i]==="nobori"?"kiku":plan[i]; // nobori は視覚上 菊に統合
  var act = i<7?"序":(i<17?"破":"急");
  var nm = NAMES[ty][nameIdx[ty]%NAMES[ty].length]; nameIdx[ty]++;
  var go = act==="急"?(i>=22?12:10):(act==="破"?(ty==="senrin"||ty==="yashi"?10:8):5);
  var mm = t0 + Math.floor(i*3.1);
  PROG.push({no:i+1, name:nm, type:ty, salt:salts[i], act:act, go:go,
    time:pad(Math.floor(mm/60))+":"+pad(mm%60)});
}
function pad(n){return (n<10?"0":"")+n;}

var state={act:"all",type:"all"};
var grid=document.getElementById("grid"), countEl=document.getElementById("count");
function render(){
  var list=PROG.filter(function(p){
    return (state.act==="all"||p.act===state.act) && (state.type==="all"||p.type===state.type); });
  grid.innerHTML = list.map(function(p){
    var actcls = p.act==="序"?"act-jo":(p.act==="破"?"act-ha":"act-kyu");
    return "<article class='card'><div class='no'>第"+p.no+"番 ・ "+p.time+"</div>"+
      mon(p.type,p.salt,p.no*97+3)+
      "<h3>"+p.name+"</h3>"+
      "<div class='meta'><span class='act "+actcls+"'>"+p.act+"</span> "+TYPEJP[p.type]+"／"+SALTJP[p.salt]+"／"+goLabel(p.go)+"</div></article>";
  }).join("");
  countEl.textContent = list.length+" 演目を表示中（全24演目）";
}
function goLabel(go){return {3:"三号玉",5:"五号玉",8:"八号玉",10:"尺玉",12:"尺五寸玉"}[go]||go+"号";}
document.querySelectorAll(".chip").forEach(function(c){
  c.addEventListener("click",function(){
    var f=this.dataset.f, v=this.dataset.v;
    state[f]=v;
    document.querySelectorAll(".chip[data-f='"+f+"']").forEach(function(x){x.setAttribute("aria-pressed", x.dataset.v===v?"true":"false");});
    render();
  });
});
render();
})();
</script>
