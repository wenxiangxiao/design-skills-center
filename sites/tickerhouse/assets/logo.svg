<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" role="img" aria-label="TickerHouse logo">
  <!-- TickerHouse — retro terminal wordmark. Colors: phosphor green #37ff70, amber #ffb000 on near-black. -->
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <rect y="0" width="4" height="1" fill="#000000" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="420" height="120" fill="#040703"/>

  <!-- CRT bezel mark -->
  <rect x="18" y="20" width="80" height="80" fill="#060c07" stroke="#37ff70" stroke-width="3"/>
  <rect x="18" y="20" width="80" height="80" fill="none" stroke="#16452b" stroke-width="1" transform="translate(6,6)"/>

  <!-- rising bars inside the screen -->
  <rect x="32" y="62" width="12" height="26" fill="#ffb000"/>
  <rect x="52" y="48" width="12" height="40" fill="#37ff70"/>
  <rect x="72" y="34" width="12" height="54" fill="#37ff70"/>
  <!-- tick line over the bars -->
  <polyline points="30,70 44,58 58,63 76,40 90,30" fill="none" stroke="#9fe8b4" stroke-width="2"/>
  <rect x="86" y="26" width="6" height="6" fill="#ffb000"/>

  <!-- scanlines over the screen only -->
  <rect x="21" y="23" width="74" height="74" fill="url(#scan)"/>

  <!-- wordmark -->
  <text x="118" y="66" font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,Menlo,monospace"
        font-size="34" font-weight="700" letter-spacing="3" fill="#37ff70">TICKER<tspan fill="#ffb000">HOUSE</tspan></text>
  <!-- block cursor -->
  <rect x="392" y="40" width="14" height="28" fill="#37ff70">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- tagline -->
  <text x="120" y="92" font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,Menlo,monospace"
        font-size="12" letter-spacing="4" fill="#5a9a6e">INDEPENDENT EQUITY RESEARCH DESK</text>
</svg>
