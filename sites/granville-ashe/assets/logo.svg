<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-label="恆嶽法律事務所 Granville & Ashe 標誌">
  <rect width="420" height="120" fill="#13110C"/>
  <!-- monogram lozenge -->
  <g transform="translate(60 60)">
    <path d="M0 -44 44 0 0 44 -44 0Z" fill="none" stroke="#B58A3C" stroke-width="2"/>
    <path d="M0 -30 30 0 0 30 -30 0Z" fill="none" stroke="#8a6a2e" stroke-width="1"/>
    <!-- deco rays -->
    <g stroke="#B58A3C" stroke-width="1" opacity=".7">
      <path d="M0 -14V14M-14 0H14M-10 -10 10 10M10 -10 -10 10"/>
    </g>
    <text x="0" y="6" font-family="'Marcellus SC',Georgia,serif" font-size="20" fill="#E7CE93" text-anchor="middle" letter-spacing="1">GA</text>
  </g>
  <!-- wordmark -->
  <g transform="translate(126 0)">
    <text x="0" y="52" font-family="'Poiret One','Century Gothic',sans-serif" font-size="30" fill="#B58A3C" letter-spacing="8">GRANVILLE</text>
    <text x="0" y="52" font-family="'Poiret One','Century Gothic',sans-serif" font-size="30" fill="#B58A3C" letter-spacing="8" opacity="0"></text>
    <text x="196" y="52" font-family="Georgia,serif" font-size="26" font-style="italic" fill="#F1E8D5">&amp;</text>
    <text x="0" y="86" font-family="'Poiret One','Century Gothic',sans-serif" font-size="30" fill="#B58A3C" letter-spacing="8">ASHE</text>
    <line x1="118" y1="76" x2="278" y2="76" stroke="#8a6a2e" stroke-width="1"/>
    <text x="278" y="86" font-family="'Marcellus SC',serif" font-size="11" fill="#B58A3C" text-anchor="end" letter-spacing="3">EST. 1958</text>
  </g>
</svg>
