<svg xmlns="http://www.w3.org/2000/svg" width="280" height="64" viewBox="0 0 280 64" role="img" aria-label="Kinetiq logo">
  <!--
    KINETIQ — motion analytics
    Mark: a "K" built from a stem, a chevron, and three speed lines
    trailing off to the left (motion echo).
    Volt #C8FF3D on near-black #0A0B0D.
  -->
  <rect width="280" height="64" fill="#0A0B0D"/>
  <g transform="translate(14,12)">
    <!-- speed lines (motion echo) -->
    <path d="M0 8h8" stroke="#C8FF3D" stroke-width="2.5" opacity=".35"/>
    <path d="M-2 20h10" stroke="#C8FF3D" stroke-width="2.5" opacity=".55"/>
    <path d="M0 32h8" stroke="#C8FF3D" stroke-width="2.5" opacity=".35"/>
    <!-- K stem -->
    <path d="M15 0v40" stroke="#C8FF3D" stroke-width="5.5"/>
    <!-- K chevron -->
    <path d="M38 0 21.5 20 38 40" stroke="#C8FF3D" stroke-width="5.5" fill="none"/>
  </g>
  <text x="68" y="43" font-family="Archivo, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="27" font-weight="900" letter-spacing="2.5" fill="#E8ECDF">KINETIQ</text>
  <!-- terminal tick: the replay cursor -->
  <rect x="212" y="22" width="5" height="21" fill="#C8FF3D">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;0.95;1" dur="1.6s" repeatCount="indefinite"/>
  </rect>
</svg>
