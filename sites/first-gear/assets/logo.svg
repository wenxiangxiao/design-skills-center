<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" width="260" height="72" role="img" aria-label="起步駕訓中心 First Gear 標誌">
  <!-- steering-wheel mark -->
  <g transform="translate(36,36)">
    <rect x="-32" y="-32" width="64" height="64" rx="9" fill="#2E373E"/>
    <circle cx="0" cy="0" r="21" fill="none" stroke="#E9B308" stroke-width="4.5"/>
    <path d="M0 -21 V21 M-21 0 H21" stroke="#E9B308" stroke-width="4.5"/>
    <circle cx="0" cy="0" r="5.5" fill="#E9B308"/>
    <!-- forward chevrons (first gear) -->
    <path d="M-9 6 L0 -3 L9 6" fill="none" stroke="#2E373E" stroke-width="3" transform="translate(0,-1)"/>
  </g>
  <!-- wordmark -->
  <g font-family="'Barlow Condensed','Noto Sans TC',sans-serif" font-weight="700">
    <text x="80" y="34" font-size="30" fill="#2E373E" letter-spacing="1">起步駕訓中心</text>
    <text x="80" y="56" font-size="16" fill="#B9860A" letter-spacing="3" font-family="'DM Mono',monospace" font-weight="500">FIRST GEAR ・ WULI</text>
  </g>
</svg>
