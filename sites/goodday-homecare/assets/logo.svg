<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 104" role="img" aria-label="日安到宅居家護理所 標誌">
  <!-- 導視站牌式 Logo：深板岩底、左側路線色階、白色方向箭頭與三線圓點 -->
  <rect x="0" y="0" width="420" height="104" rx="16" fill="#22343B"/>
  <!-- 左側標誌方塊 -->
  <rect x="12" y="12" width="80" height="80" rx="12" fill="#EDF1F2"/>
  <!-- 屋形（到宅）：無描邊色塊 -->
  <path d="M52 24 L82 46 L74 46 L74 60 L30 60 L30 46 L22 46 Z" fill="#22343B"/>
  <!-- 門口留白 -->
  <rect x="46" y="46" width="12" height="14" rx="2" fill="#EDF1F2"/>
  <!-- 前往方向箭頭（進宅路徑） -->
  <path d="M26 74 h30 v-8 l16 12 -16 12 v-8 H26 Z" fill="#22343B"/>
  <!-- 三條服務線圓點 -->
  <circle cx="24" cy="34" r="5" fill="#BF4522"/>
  <circle cx="24" cy="47" r="5" fill="#1F6FA5"/>
  <circle cx="80" cy="74" r="5" fill="#2E7D4F"/>
  <!-- 字標 -->
  <text x="108" y="48" font-family="'Noto Sans TC','PingFang TC',sans-serif" font-weight="900" font-size="30" fill="#EDF1F2">日安到宅居家護理所</text>
  <text x="109" y="76" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-weight="600" font-size="17" letter-spacing="3.5" fill="#9FB3BA">GOODDAY HOME NURSING · TAIPEI</text>
  <!-- 右側路線色帶 -->
  <rect x="398" y="12" width="10" height="26" rx="3" fill="#BF4522"/>
  <rect x="398" y="40" width="10" height="26" rx="3" fill="#1F6FA5"/>
  <rect x="398" y="68" width="10" height="26" rx="3" fill="#2E7D4F"/>
</svg>
