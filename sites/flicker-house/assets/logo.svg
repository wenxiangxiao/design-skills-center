<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 96" role="img" aria-label="明滅戲院 THE FLICKER HOUSE">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#58B3C2" stop-opacity=".85"/>
      <stop offset="1" stop-color="#58B3C2" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- projector beam -->
  <path d="M30 20 L4 84 L56 84 Z" fill="url(#beam)"/>
  <!-- bulb / lamp -->
  <circle cx="30" cy="20" r="10" fill="#100D14" stroke="#F2B33C" stroke-width="3"/>
  <circle cx="30" cy="20" r="3.4" fill="#F2B33C"/>
  <!-- screen frame at base of beam -->
  <rect x="8" y="80" width="44" height="6" rx="1" fill="#ECE7DA"/>
  <!-- wordmark -->
  <text x="70" y="44" font-family="'Noto Serif TC', serif" font-weight="900" font-size="38" fill="#ECE7DA" letter-spacing="2">明滅</text>
  <text x="70" y="74" font-family="'Oswald', sans-serif" font-weight="500" font-size="15" fill="#F2B33C" letter-spacing="4">FLICKER HOUSE</text>
  <!-- sprocket ticks -->
  <g fill="#7C1D2A">
    <rect x="70" y="82" width="8" height="6" rx="1"/>
    <rect x="84" y="82" width="8" height="6" rx="1"/>
    <rect x="98" y="82" width="8" height="6" rx="1"/>
  </g>
</svg>
