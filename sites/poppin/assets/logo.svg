<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 210" role="img" aria-label="Poppin — 即時揪團 App">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lilita+One&amp;display=swap');
    .word { font-family: 'Lilita One', 'Arial Black', sans-serif; }
  </style>

  <!-- 爆炸星芒（burst） -->
  <polygon
    points="186,96 158,80.5 174.5,53 142.4,53.6 143,21.5 115.5,38 100,10 84.5,38 57,21.5 57.6,53.6 25.5,53 42,80.5 14,96 42,111.5 25.5,139 57.6,138.4 57,170.5 84.5,154 100,182 115.5,154 143,170.5 142.4,138.4 174.5,139 158,111.5"
    fill="#FFD400" stroke="#141414" stroke-width="6" stroke-linejoin="round"
    transform="rotate(-8 100 96)"/>

  <!-- 對話泡泡＋尾巴（單一 path，含 P! ） -->
  <g transform="rotate(-6 100 96)">
    <path d="M76 54 h48 a26 26 0 0 1 26 26 v18 a26 26 0 0 1 -26 26 h-12 l-24 24 5 -24 h-17 a26 26 0 0 1 -26 -26 v-18 a26 26 0 0 1 26 -26 z"
      fill="#FF3EA5" stroke="#141414" stroke-width="6" stroke-linejoin="round"/>
    <text class="word" x="99" y="108" text-anchor="middle" font-size="52" fill="#FFFFFF" stroke="#141414" stroke-width="2.5" paint-order="stroke">P!</text>
  </g>

  <!-- 文字標準字 -->
  <text class="word" x="212" y="140" font-size="104" fill="#141414" letter-spacing="2">Poppin</text>

  <!-- 底線波浪（鈷藍） -->
  <path d="M216 168 q28 16 56 0 t56 0 t56 0 t56 0 t56 0 t56 0 t56 0"
    fill="none" stroke="#2B5BFF" stroke-width="9" stroke-linecap="round"/>

  <!-- 右上角小星星（橘） -->
  <polygon points="648,34 655,52 674,52 659,64 664,82 648,71 632,82 637,64 622,52 641,52"
    fill="#FF7A1A" stroke="#141414" stroke-width="4" stroke-linejoin="round"/>
</svg>
