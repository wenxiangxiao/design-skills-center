<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>型錄 Objects｜FACET 選物・十二件當期選品</title>
<meta name="description" content="FACET 選物：台北中山區的當代選品店。當期十二件選物型錄，依材質分類，立體構成縮圖，六面規格。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,3 28,10 28,22 16,29 4,22 4,10' fill='%23F5F4EF' stroke='%2316150F' stroke-width='2' stroke-linejoin='round'/%3E%3Cpolygon points='16,3 28,10 16,17 4,10' fill='%232622E0'/%3E%3Cline x1='16' y1='17' x2='16' y2='29' stroke='%2316150F' stroke-width='2'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5F4EF; --panel:#FBFAF6; --ink:#16150F; --cobalt:#2622E0;
  --grey:#8C887E; --hair:#DCD9D0;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:"Noto Sans TC",sans-serif;font-weight:300;line-height:1.8;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.mono{font-family:"Space Mono",monospace}
.gro{font-family:"Space Grotesk",sans-serif}
h1,h2,h3{font-family:"Space Grotesk",sans-serif;font-weight:700;line-height:1.05;margin:0;letter-spacing:-.01em}

/* topbar */
header{position:sticky;top:0;z-index:30;background:rgba(245,244,239,.9);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--ink);display:flex;align-items:center;justify-content:space-between;
  padding:14px clamp(18px,4vw,52px)}
header .brand img{height:34px;display:block}
header nav{display:flex;gap:28px;align-items:center}
header nav a{font-family:"Space Mono",monospace;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;position:relative;padding:4px 0}
header nav a::after{content:"";position:absolute;left:0;bottom:-2px;width:0;height:2px;background:var(--cobalt);transition:width .28s ease}
header nav a:hover::after,header nav a[aria-current]::after{width:100%}
header nav a[aria-current]{color:var(--cobalt)}
.navtoggle{display:none;background:none;border:1px solid var(--ink);font-family:"Space Mono",monospace;font-size:.75rem;padding:5px 10px;cursor:pointer}

.pad{padding-inline:clamp(18px,4vw,52px)}
.kick{font-family:"Space Mono",monospace;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--cobalt)}

/* SPLIT-SCREEN HERO */
.hero{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 63px);border-bottom:1px solid var(--ink)}
@media(max-width:900px){.hero{grid-template-columns:1fr;min-height:0}}
.stagecol{border-right:1px solid var(--ink);display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:40px 24px;position:sticky;top:63px;height:calc(100vh - 63px);background:
  linear-gradient(var(--hair) 1px,transparent 1px) 0 0/100% 46px,
  linear-gradient(90deg,var(--hair) 1px,transparent 1px) 0 0/46px 100%,var(--panel)}
@media(max-width:900px){.stagecol{position:static;height:auto;border-right:none;border-bottom:1px solid var(--ink)}}
.stage{perspective:1000px;width:240px;height:240px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none}
.stage.drag{cursor:grabbing}
.cube{position:relative;width:200px;height:200px;transform-style:preserve-3d;
  transform:rotateX(-18deg) rotateY(-28deg);transition:transform .1s linear}
.cube.flip{transition:transform .7s cubic-bezier(.6,.02,.2,1)}
.face{position:absolute;width:200px;height:200px;background:var(--panel);border:1.5px solid var(--ink);
  display:flex;flex-direction:column;justify-content:space-between;padding:16px;backface-visibility:visible}
.face .fno{font-family:"Space Mono",monospace;font-size:.7rem;letter-spacing:.2em;color:var(--cobalt)}
.face .flabel{font-family:"Space Mono",monospace;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--grey)}
.face .fval{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:1.15rem;line-height:1.15;letter-spacing:-.01em}
.face .fval.zh{font-family:"Noto Sans TC",sans-serif;font-weight:500}
.f-front{transform:translateZ(100px)}
.f-back{transform:rotateY(180deg) translateZ(100px)}
.f-right{transform:rotateY(90deg) translateZ(100px);background:var(--cobalt);color:#fff;border-color:var(--cobalt)}
.f-right .flabel{color:rgba(255,255,255,.7)}.f-right .fno{color:#fff}
.f-left{transform:rotateY(-90deg) translateZ(100px)}
.f-top{transform:rotateX(90deg) translateZ(100px)}
.f-bottom{transform:rotateX(-90deg) translateZ(100px)}
.stagehint{font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.14em;color:var(--grey);margin-top:26px;text-align:center}

.infocol{padding:clamp(30px,5vw,64px) clamp(22px,4vw,56px);display:flex;flex-direction:column;justify-content:center}
.infocol h1{font-size:clamp(2rem,4.4vw,3.4rem)}
.infocol h1 em{font-style:normal;color:var(--cobalt)}
.objmeta{margin-top:22px;border-top:1px solid var(--ink)}
.objmeta .row{display:grid;grid-template-columns:120px 1fr;gap:10px;padding:11px 0;border-bottom:1px solid var(--hair)}
.objmeta .row dt{font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--grey)}
.objmeta .row dd{margin:0;font-size:.95rem;font-weight:400}
.objstory{margin:22px 0;font-size:.98rem;line-height:1.95;max-width:46ch}
.objprice{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:1.5rem}
.objprice small{font-family:"Space Mono",monospace;font-size:.6em;color:var(--grey);font-weight:400}
.objnav{display:flex;gap:10px;margin-top:24px;align-items:center}
.objnav button{font-family:"Space Mono",monospace;font-size:.78rem;letter-spacing:.1em;background:var(--paper);
  border:1.5px solid var(--ink);padding:9px 18px;cursor:pointer;transition:background .2s,color .2s}
.objnav button:hover{background:var(--ink);color:var(--paper)}
.objnav .count{font-family:"Space Mono",monospace;font-size:.8rem;color:var(--grey);margin-left:auto}

/* dimension annotation */
.dimwrap{margin-top:10px}
.dimwrap svg{width:100%;max-width:360px;height:auto}
.dimline{stroke:var(--cobalt);stroke-width:1.2;fill:none}
.dimtick{stroke:var(--ink);stroke-width:1}
.dimtxt{font-family:"Space Mono",monospace;font-size:9px;fill:var(--ink)}
.objshape{stroke:var(--ink);stroke-width:1.5;fill:none}

/* selling points */
section{border-bottom:1px solid var(--ink)}
.sec{padding-block:clamp(46px,6vw,88px)}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--ink);border-left:1px solid var(--ink)}
@media(max-width:820px){.three{grid-template-columns:1fr}}
.three .cell{border-right:1px solid var(--ink);border-bottom:1px solid var(--ink);padding:30px 26px;min-height:200px;position:relative;background:var(--panel)}
.three .cell .n{font-family:"Space Mono",monospace;color:var(--cobalt);font-size:.72rem;letter-spacing:.2em}
.three .cell h3{font-size:1.4rem;margin:.5em 0 .5em}
.three .cell p{font-size:.9rem;margin:0;color:#413f38}
/* mini faceted forms */
.mini{position:absolute;right:20px;bottom:18px;width:56px;height:56px;perspective:200px}
.mini .m{width:56px;height:56px;position:relative;transform-style:preserve-3d;animation:spin 14s linear infinite}
.mini .mf{position:absolute;width:56px;height:56px;border:1.4px solid var(--ink);background:rgba(38,34,224,.06)}
.mini .mf:nth-child(1){transform:translateZ(28px)}
.mini .mf:nth-child(2){transform:rotateY(90deg) translateZ(28px)}
.mini .mf:nth-child(3){transform:rotateY(180deg) translateZ(28px)}
.mini .mf:nth-child(4){transform:rotateY(270deg) translateZ(28px)}
@keyframes spin{to{transform:rotateX(360deg) rotateY(360deg)}}

/* quote */
.quote{padding-block:clamp(50px,7vw,96px);text-align:center;background:var(--ink);color:var(--paper)}
.quote p{font-family:"Space Grotesk",sans-serif;font-weight:500;font-size:clamp(1.3rem,3vw,2.1rem);line-height:1.5;margin:0 auto;max-width:22ch}
.quote span{font-family:"Space Mono",monospace;font-size:.74rem;letter-spacing:.2em;color:var(--grey);display:block;margin-top:20px}

footer{padding:34px clamp(18px,4vw,52px);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:.8rem}
footer .gro{font-weight:700;letter-spacing:.06em}
footer a:hover{color:var(--cobalt)}
.disc{color:var(--grey);font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.04em}

@media(max-width:760px){
  header nav{position:absolute;top:100%;left:0;right:0;flex-direction:column;gap:0;background:var(--paper);
    border-bottom:1px solid var(--ink);max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 clamp(18px,4vw,52px)}
  header nav.open{max-height:280px}
  header nav a{padding:13px 0;border-bottom:1px solid var(--hair);width:100%}
  .navtoggle{display:block}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto}.cube{transition:none!important}}
</style>
</head>

<body>
<header>
  <a class="brand" href="index.html" aria-label="FACET 選物 首頁"><img src="assets/logo.svg" alt="FACET 選物"></a>
  <button class="navtoggle" aria-label="選單" onclick="document.getElementById('nav').classList.toggle('open')">MENU</button>
  <nav id="nav">
    <a href="index.html">Showcase</a>
    <a href="objects.html" aria-current="page">型錄 Objects</a>
    <a href="about.html">觀點 About</a>
  </nav>
</header>
<main>
<section class="sec pad">
  <span class="kick">Objects / 型錄</span>
  <h2 style="font-size:clamp(1.8rem,4vw,3rem);margin:.35em 0 .3em">當期選物 · 十二件</h2>
  <p style="max-width:52ch;color:#413f38;margin:0 0 26px">依材質分類。每件都經過「六面檢查」——品名、材質、尺寸、產地、設計者、定價，缺一面不上架。點選材質可篩選。</p>

  <div id="filters" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px">
    <button class="fbtn" data-f="all" aria-pressed="true">全部</button>
    <button class="fbtn" data-f="金屬">金屬</button>
    <button class="fbtn" data-f="陶瓷">陶瓷</button>
    <button class="fbtn" data-f="木">木作</button>
    <button class="fbtn" data-f="玻璃">玻璃</button>
    <button class="fbtn" data-f="織物">織物</button>
  </div>

  <div class="catalog" id="catalog"></div>
</section>

<div class="quote">
  <p>「型錄不是清單，是我們替你先翻過一遍的六個面。」</p>
  <span>FACET 選物</span>
</div>
</main>
<footer>
  <span class="gro">FACET 選物　台北市中山區赤峰街 12 巷 5 號</span>
  <span><a href="objects.html">型錄</a>　·　<a href="about.html">觀點</a>　·　(02) 2556-0417</span>
  <span class="disc">本站為設計示範，品牌、物件、價格、地址與人物皆為虛構示意。</span>
</footer>
<style>
.fbtn{font-family:"Space Mono",monospace;font-size:.76rem;letter-spacing:.08em;background:var(--paper);
  border:1.5px solid var(--ink);padding:7px 15px;cursor:pointer;transition:background .2s,color .2s}
.fbtn[aria-pressed="true"]{background:var(--ink);color:var(--paper)}
.fbtn:hover{background:var(--cobalt);color:#fff;border-color:var(--cobalt)}
.catalog{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:0;
  border-top:1px solid var(--ink);border-left:1px solid var(--ink);margin-top:18px}
.card{border-right:1px solid var(--ink);border-bottom:1px solid var(--ink);padding:24px 22px 22px;background:var(--panel);
  display:flex;flex-direction:column;gap:12px;transition:background .25s}
.card:hover{background:#fff}
.card .thumb{perspective:340px;height:110px;display:flex;align-items:center;justify-content:center}
.card .c3{width:70px;height:70px;position:relative;transform-style:preserve-3d;transform:rotateX(-20deg) rotateY(-25deg);
  animation:tumble 18s linear infinite}
.card:hover .c3{animation-duration:5s}
.card .c3 .cf{position:absolute;width:70px;height:70px;border:1.4px solid var(--ink)}
.card .c3 .cf:nth-child(1){transform:translateZ(35px)}
.card .c3 .cf:nth-child(2){transform:rotateY(90deg) translateZ(35px)}
.card .c3 .cf:nth-child(3){transform:rotateY(180deg) translateZ(35px)}
.card .c3 .cf:nth-child(4){transform:rotateY(-90deg) translateZ(35px)}
.card .c3 .cf:nth-child(5){transform:rotateX(90deg) translateZ(35px)}
.card .c3 .cf:nth-child(6){transform:rotateX(-90deg) translateZ(35px)}
@keyframes tumble{to{transform:rotateX(340deg) rotateY(380deg)}}
.card .cno{font-family:"Space Mono",monospace;font-size:.66rem;letter-spacing:.16em;color:var(--cobalt)}
.card h3{font-size:1.15rem}
.card .cmat{font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.1em;color:var(--grey);text-transform:uppercase}
.card .cspec{font-size:.82rem;color:#413f38;margin:0}
.card .cprice{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:1.05rem;margin-top:auto}
@media(prefers-reduced-motion:reduce){.card .c3{animation:none!important}}
</style>
<script>
(function(){
  "use strict";
  var CAT = [
    {n:"留白 文鎮",cat:"金屬",mat:"實心黃銅",size:"60×60×18 mm",price:"NT$1,480",tint:"rgba(198,161,91,.22)"},
    {n:"黃銅 書擋（一對）",cat:"金屬",mat:"黃銅・砂面",size:"90×120×70 mm",price:"NT$2,980",tint:"rgba(198,161,91,.22)"},
    {n:"不鏽鋼 開信刀",cat:"金屬",mat:"420 不鏽鋼",size:"180×22 mm",price:"NT$960",tint:"rgba(140,136,126,.20)"},
    {n:"志野 單枝花器",cat:"陶瓷",mat:"志野陶土",size:"⌀80×140 mm",price:"NT$2,600",tint:"rgba(166,71,46,.16)"},
    {n:"粉引 茶碗",cat:"陶瓷",mat:"粉引白化妝土",size:"⌀120×70 mm",price:"NT$1,350",tint:"rgba(166,71,46,.16)"},
    {n:"黑陶 香台",cat:"陶瓷",mat:"燻黑無釉陶",size:"⌀95×25 mm",price:"NT$880",tint:"rgba(22,21,15,.12)"},
    {n:"楓木 托盤",cat:"木",mat:"硬楓・生漆",size:"300×220×16 mm",price:"NT$2,200",tint:"rgba(120,86,40,.18)"},
    {n:"胡桃木 筆盤",cat:"木",mat:"胡桃實木",size:"210×90×20 mm",price:"NT$1,180",tint:"rgba(120,86,40,.18)"},
    {n:"手工吹製 玻璃杯",cat:"玻璃",mat:"無鉛硼矽",size:"⌀72×95 mm",price:"NT$780",tint:"rgba(38,34,224,.10)"},
    {n:"再生玻璃 花瓶",cat:"玻璃",mat:"回收玻璃",size:"⌀110×180 mm",price:"NT$1,560",tint:"rgba(38,34,224,.10)"},
    {n:"亞麻 桌旗",cat:"織物",mat:"水洗法國亞麻",size:"400×1400 mm",price:"NT$1,180",tint:"rgba(140,136,126,.20)"},
    {n:"羊毛 杯墊（四入）",cat:"織物",mat:"壓縮羊毛氈",size:"⌀100×8 mm",price:"NT$640",tint:"rgba(140,136,126,.20)"}
  ];
  var el = document.getElementById("catalog");
  function faces(tint){
    var s="";
    for(var f=0;f<6;f++) s+='<div class="cf" style="background:'+tint+'"></div>';
    return s;
  }
  function draw(list){
    el.innerHTML = list.map(function(o,idx){
      return '<article class="card" data-cat="'+o.cat+'">'+
        '<div class="thumb"><div class="c3">'+faces(o.tint)+'</div></div>'+
        '<div class="cno">No.'+("0"+(idx+1)).slice(-2)+'</div>'+
        '<h3>'+o.n+'</h3>'+
        '<div class="cmat">'+o.mat+'</div>'+
        '<p class="cspec">'+o.size+'</p>'+
        '<div class="cprice">'+o.price+'</div>'+
      '</article>';
    }).join("");
  }
  draw(CAT);
  var btns = document.querySelectorAll(".fbtn");
  for(var b=0;b<btns.length;b++){
    btns[b].addEventListener("click",function(){
      for(var j=0;j<btns.length;j++) btns[j].setAttribute("aria-pressed","false");
      this.setAttribute("aria-pressed","true");
      var f=this.getAttribute("data-f");
      draw(f==="all"?CAT:CAT.filter(function(o){return o.cat===f;}));
    });
  }
})();
</script>
</body>
</html>
