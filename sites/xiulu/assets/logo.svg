<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96" role="img" aria-label="鏽綠所 XIULU 鐵窗花普查與再製工作室">
  <rect width="360" height="96" fill="#2FA8A0"/>
  <!-- 鐵窗花標記：外框 + 四方對稱花樣 -->
  <g transform="translate(8,8)">
    <rect x="2" y="2" width="76" height="76" fill="none" stroke="#15201E" stroke-width="7"/>
    <!-- 花面 -->
    <g fill="#F2ECD9">
      <rect x="10" y="10" width="24" height="24"/><rect x="46" y="46" width="24" height="24"/>
    </g>
    <g fill="#E8452F"><rect x="46" y="10" width="24" height="24"/><rect x="10" y="46" width="24" height="24"/></g>
    <!-- 十字主桿 -->
    <path d="M40 4v72M4 40h72" stroke="#15201E" stroke-width="6"/>
    <!-- 斜角桿 -->
    <path d="M10 10l24 24M34 10L10 34M46 46l24 24M70 46L46 70" stroke="#15201E" stroke-width="4.5"/>
    <!-- 中心焊點 -->
    <circle cx="40" cy="40" r="6.5" fill="#F5C518" stroke="#15201E" stroke-width="3"/>
  </g>
  <!-- 字標 -->
  <g transform="translate(104,0)">
    <text x="0" y="44" font-family="'Big Shoulders Display','Noto Sans TC',sans-serif" font-weight="800" font-size="40" letter-spacing="3" fill="#15201E">XIULU</text>
    <text x="2" y="76" font-family="'Noto Sans TC',sans-serif" font-weight="700" font-size="22" letter-spacing="8" fill="#15201E">鏽綠所</text>
    <rect x="150" y="26" width="3" height="52" fill="#E8452F"/>
    <text x="164" y="42" font-family="'Noto Sans TC',sans-serif" font-weight="500" font-size="12.5" letter-spacing="1" fill="#15201E">鐵窗花普查</text>
    <text x="164" y="62" font-family="'Noto Sans TC',sans-serif" font-weight="500" font-size="12.5" letter-spacing="1" fill="#15201E">與再製工作室</text>
  </g>
</svg>
