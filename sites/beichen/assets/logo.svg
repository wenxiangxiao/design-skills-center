  <rect width="260" height="64" fill="#0B0A08"/>
  <!-- scanlines -->
  <g fill="#FFB000" opacity="0.06">
    <rect x="0" y="0" width="260" height="2"/><rect x="0" y="8" width="260" height="2"/>
    <rect x="0" y="16" width="260" height="2"/><rect x="0" y="24" width="260" height="2"/>
