<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="亂流製造 Turbulence Brewing logo">
  <!--
    亂流製造 TURBULENCE BREWING — 原創 logo
    構成：黑方塊（發酵槽剖面）＋三道亂流折線（黑／黑／橘紅）＋粗黑中文字標＋mono 英文副標
    色彩：#FFD400 / #000000 / #FF3E00
  -->
  <rect width="640" height="200" fill="#FFD400"/>
  <rect x="8" y="8" width="624" height="184" fill="none" stroke="#000000" stroke-width="8"/>

  <!-- 圖標：亂流方塊 -->
  <g>
    <rect x="28" y="28" width="144" height="144" fill="#000000"/>
    <path d="M44 66 L68 94 L92 58 L116 102 L140 64 L156 88"
          fill="none" stroke="#FFD400" stroke-width="10" stroke-linecap="square"/>
    <path d="M44 106 L68 134 L92 98 L116 142 L140 104 L156 128"
          fill="none" stroke="#FFD400" stroke-width="10" stroke-linecap="square"/>
    <path d="M44 146 L68 174 L92 138 L116 174 L140 144 L156 162"
          fill="none" stroke="#FF3E00" stroke-width="10" stroke-linecap="square"/>
  </g>

  <!-- 中文字標 -->
  <text x="196" y="118"
        font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif"
        font-weight="900" font-size="84" letter-spacing="2" fill="#000000">亂流製造</text>

  <!-- 英文副標 -->
  <rect x="196" y="136" width="396" height="34" fill="#000000"/>
  <text x="208" y="160"
        font-family="'Space Mono','Courier New',monospace"
        font-weight="700" font-size="21" letter-spacing="3" fill="#FFD400">TURBULENCE BREWING</text>

  <!-- 產地章 -->
  <g transform="translate(596,54) rotate(8)">
    <rect x="-38" y="-20" width="76" height="40" fill="none" stroke="#FF3E00" stroke-width="5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-weight="700" font-size="13" fill="#FF3E00">TAINAN</text>
    <text x="0" y="14" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-weight="700" font-size="13" fill="#FF3E00">EST.2019</text>
  </g>
</svg>
