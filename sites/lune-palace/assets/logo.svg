<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" role="img" aria-label="月殿影展 Lune Palace">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E7D294"/>
      <stop offset="1" stop-color="#C7A24B"/>
    </linearGradient>
  </defs>
  <rect width="240" height="120" fill="#151019"/>
  <!-- stepped deco frame -->
  <path d="M20 22 H220 V98 H20 Z" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <path d="M28 30 H212 V90 H28 Z" fill="none" stroke="url(#g)" stroke-width="0.8"/>
  <!-- sunburst fan behind monogram -->
  <g stroke="url(#g)" stroke-width="1.4">
    <line x1="120" y1="60" x2="120" y2="18"/>
    <line x1="120" y1="60" x2="150" y2="24"/>
    <line x1="120" y1="60" x2="90" y2="24"/>
    <line x1="120" y1="60" x2="176" y2="40"/>
    <line x1="120" y1="60" x2="64" y2="40"/>
  </g>
  <!-- crescent moon -->
  <path d="M120 34 a20 20 0 1 0 12 36 a16 16 0 1 1 -12 -36 Z" fill="url(#g)"/>
  <!-- LP monogram -->
  <text x="120" y="82" text-anchor="middle" font-family="Cinzel, serif" font-weight="900" font-size="20" letter-spacing="4" fill="url(#g)">LUNE&#160;PALACE</text>
  <!-- chevrons -->
  <path d="M40 104 l8 6 l8 -6 M184 104 l8 6 l8 -6" fill="none" stroke="url(#g)" stroke-width="1.2"/>
</svg>
