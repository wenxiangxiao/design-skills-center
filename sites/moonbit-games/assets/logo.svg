<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="月位元 MOONBIT GAMES 像素月亮標誌">
  <!-- 月位元 MOONBIT GAMES — 原創像素 logo
       16x16 格、放大 2 倍繪製：弦月（黃）＋ 脫離的一顆位元（青）＋ 星（洋紅） -->
  <rect width="32" height="32" fill="#0b1026"/>
  <!-- 弦月主體 -->
  <g fill="#ffd23f">
    <rect x="10" y="4"  width="12" height="2"/>
    <rect x="6"  y="6"  width="10" height="2"/>
    <rect x="4"  y="8"  width="8"  height="2"/>
    <rect x="4"  y="10" width="6"  height="2"/>
    <rect x="4"  y="12" width="6"  height="2"/>
    <rect x="4"  y="14" width="6"  height="2"/>
    <rect x="4"  y="16" width="6"  height="2"/>
    <rect x="4"  y="18" width="6"  height="2"/>
    <rect x="4"  y="20" width="8"  height="2"/>
    <rect x="6"  y="22" width="10" height="2"/>
    <rect x="10" y="24" width="12" height="2"/>
  </g>
  <!-- 內緣暗階（增加體積感，仍維持低色階） -->
  <g fill="#c79616">
    <rect x="14" y="6"  width="2" height="2"/>
    <rect x="10" y="8"  width="2" height="2"/>
    <rect x="8"  y="10" width="2" height="2"/>
    <rect x="8"  y="18" width="2" height="2"/>
    <rect x="10" y="20" width="2" height="2"/>
    <rect x="14" y="22" width="2" height="2"/>
  </g>
  <!-- 脫離月面的一顆「位元」 -->
  <rect x="22" y="13" width="4" height="4" fill="#2ee6d6"/>
  <rect x="26" y="12" width="2" height="2" fill="#2ee6d6"/>
  <!-- 星 -->
  <rect x="24" y="5" width="2" height="2" fill="#ff4fa3"/>
  <rect x="21" y="24" width="2" height="2" fill="#ff4fa3"/>
</svg>
